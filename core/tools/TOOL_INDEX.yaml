  - id: tool.wiki_full_history_ingest
    name: wiki_full_history_ingest
    role: stage_helper
    purpose: Fetch and normalize full public Dissident93 Wikimedia contribution history and produce an LLM-readable habits profile.
    entrypoint: python domains/wiki/tools/wiki_tools/ingest_full_wikimedia_history.py --username Dissident93 --projects enwiki,wikidata,commons
    inputs:
      - public Wikimedia usercontribs APIs for Dissident93
    outputs:
      - domains/wiki/data/dissident93_wikimedia_full_history.jsonl
      - domains/wiki/data/dissident93_wikimedia_full_history_profile.json
      - domains/wiki/reports/dissident93_wiki_habits_profile.md
    safety_mode: public_api_read_only; no live edits; polite pagination; full JSONL stays local/ignored.
    artifact_report_path: domains/wiki/reports/
    deprecated_helpers_replaced:
      - capped 2020-2026 archived API slice as primary account profile


    safety_mode: read_write_gated for derived artifacts; reports before canon.
    artifact_report_path: domains/language/reports/
    deprecated_helpers_replaced:
      - isolated language pattern mining scripts

  - id: tool.games_pipeline
    name: games_pipeline

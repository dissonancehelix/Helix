version: 0.1
status: canonical
updated: 2026-04-27
items:
  - id: tool.workstation_bridge
    name: workstation_bridge
    role: canonical
    purpose: Read-only inventory of the Helix workspace and registered sources.
    entrypoint: python core/tools/workstation_bridge/workstation_snapshot.py --root . --config core/tools/workstation_bridge/config.example.yaml --out core/reports/workstation
    inputs:
      - core/map/sources.yaml
      - core/tools/workstation_bridge/config.example.yaml
    outputs:
      - core/reports/workstation/
    safety_mode: read_only; writes reports only inside the repo.
    artifact_report_path: core/reports/workstation/
    deprecated_helpers_replaced:
      - ad hoc root tree scans
      - manual README coverage sweeps

  - id: tool.boundary_check
    name: boundary_check
    role: canonical
    purpose: Validate root ontology, map YAML shape, required folders, and loose root files.
    entrypoint: python core/engine/agent_harness/check_workspace.py
    inputs:
      - README.md
      - DISSONANCE.md
      - AGENTS.md
      - core/map/*.yaml
      - domains/*/README.md
    outputs:
      - console validation result
    safety_mode: read_only.
    artifact_report_path: core/reports/workstation/ when paired with workstation_bridge.
    deprecated_helpers_replaced:
      - manual ontology checks
      - old root-folder checks for apps/, domains/, helix/, intake/, map/

  - id: tool.music_bridge
    name: music_bridge
    role: canonical
    purpose: Read-only bridge between foobar2000/library state and Helix-shaped music review records.
    entrypoint: python -m domains.music.tools.music_bridge.diagnostics
    inputs:
      - foobar2000/library exports
      - core/atlas/
      - domains/music/model/
    outputs:
      - domains/music/reports/
      - domains/music/core/atlas/
    safety_mode: read_only/proposal_only unless trust gates are explicitly satisfied.
    artifact_report_path: domains/music/reports/
    deprecated_helpers_replaced:
      - direct foobar mutation scripts
      - manual music atlas reconciliation notes

  - id: tool.music_pipeline
    name: music_pipeline
    role: canonical
    purpose: Multi-stage music metadata, entity, taste, retrieval, and materialization pipeline.
    entrypoint: python -m domains.music.tools.music_pipeline.router
    inputs:
      - archive/raw/ restored locally when source re-ingest is needed
      - domains/music/data/derived/music/
      - domains/music/domains/music/data/derived/music_pipeline/data/
      - domains/music/vendor/music_toolkits/
    outputs:
      - domains/music/domains/music/data/derived/music_pipeline/
      - domains/music/reports/
    safety_mode: read_write_gated for derived artifacts; no raw evidence deletion.
    artifact_report_path: domains/music/reports/
    deprecated_helpers_replaced:
      - one-off music ingestion scripts
      - direct domains/music/data/derived/music/library mutations

  - id: tool.foobar
    name: foobar
    role: canonical
    purpose: foobar2000 audit, semantic diff, reporting, and repair-plan workflow.
    entrypoint: python -m domains.music.tools.foobar.runner
    inputs:
      - foobar2000 exports or local database snapshots
      - domains/music/domains/music/data/derived/music_pipeline/
    outputs:
      - domains/music/reports/
      - patch or repair proposals
    safety_mode: proposal_only by default; external writeback requires full trust gates.
    artifact_report_path: domains/music/reports/
    deprecated_helpers_replaced:
      - direct playlist/tag repair scripts without review output

  - id: tool.trails
    name: trails
    role: canonical
    purpose: Trails corpus ingest, normalization, retrieval, and wiki/export pipeline.
    entrypoint: python domains/trails/tools/trails/pipelines/generate/generate_atlas.py
    inputs:
      - archive/raw/ restored locally when Trails corpus re-ingest is needed
      - domains/trails/domains/trails/data/derived/trails/retrieval/index/
    outputs:
      - domains/trails/domains/trails/data/derived/trails/
      - domains/trails/reports/
    safety_mode: derived_artifacts_only unless a specific external wiki writeback gate is opened.
    artifact_report_path: domains/trails/reports/
    deprecated_helpers_replaced:
      - domains/trails/tools/trails/archive/one_time_seeds/*
      - domains/trails/tools/trails/scratch/*

  - id: tool.language_pipeline
    name: language_pipeline

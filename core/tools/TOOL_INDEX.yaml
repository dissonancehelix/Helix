  - id: tool.wiki_history_restore
    name: wiki_history_restore
    role: stage_helper
    purpose: Restore archived Dissident93 Wikimedia API pipeline outputs into wiki-domain normalized data.
    entrypoint: python domains/wiki/tools/wiki_tools/restore_wikimedia_archive.py
    inputs:
      - domains/wiki/data/dissident93_wikimedia_history.json

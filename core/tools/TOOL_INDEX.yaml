items:
  - id: tool.workstation_bridge
    name: workstation_bridge
    role: canonical
    purpose: Read-only inventory of the Helix workspace and registered sources.
    entrypoint: python core/tools/workstation_bridge/workstation_snapshot.py --root . --config core/tools/workstation_bridge/config.example.yaml --out core/reports/workstation
    inputs:
      - core/map/sources.yaml
      - core/tools/workstation_bridge/config.example.yaml
    outputs:
      - core/reports/workstation/
    safety_mode: read_only; writes reports only inside the repo.
    artifact_report_path: core/reports/workstation/
    deprecated_helpers_replaced:
      - ad hoc root tree scans
      - manual README coverage sweeps

  - id: tool.boundary_check
    name: boundary_check
    role: canonical
    purpose: Validate root ontology, map YAML shape, required folders, and loose root files.
    entrypoint: python core/engine/agent_harness/check_workspace.py
    inputs:
      - README.md
      - DISSONANCE.md
      - AGENTS.md
      - core/map/*.yaml
      - domains/*/<DOMAIN>.md
    outputs:
      - console validation result
    safety_mode: read_only.
    artifact_report_path: core/reports/workstation/ when paired with workstation_bridge.
    deprecated_helpers_replaced:
      - manual ontology checks
      - old root-folder checks for apps/, domains/, helix/, intake/, map/

  - id: tool.aoc_core_check
    name: aoc_core_check
    role: canonical
    purpose: Validate the Appearance–Ownership–Continuity core harness files, claim ledger, test registry, theory comparison roles, internal links, and report/canon boundaries.
    entrypoint: python core/engine/agent_harness/check_aoc_core.py
    inputs:
      - labs/appearance_ownership_continuity/core/README.md
      - labs/appearance_ownership_continuity/core/A_SPLIT.md
      - labs/appearance_ownership_continuity/core/PRIMITIVES.md
      - labs/appearance_ownership_continuity/core/CLAIM_LEDGER.yaml
      - labs/appearance_ownership_continuity/core/TEST_REGISTRY.yaml
      - labs/appearance_ownership_continuity/core/THEORY_COMPARISON.md
      - labs/appearance_ownership_continuity/core/reports/
    outputs:
      - console validation result
    safety_mode: read_only.
    artifact_report_path: labs/appearance_ownership_continuity/core/reports/ when paired with conceptual calibration reports.
    deprecated_helpers_replaced:
      - manual AOC core ledger checks
      - ad hoc report-to-canon scans

  - id: tool.music_bridge
    name: bridge
    role: canonical
    purpose: Read-only bridge between foobar2000/library state and Helix-shaped music review records.
    entrypoint: python -m domains.music.tools.bridge.diagnostics
    inputs:
      - foobar2000/library exports
      - domains/music/data/atlas/
      - domains/music/model/
    outputs:
      - domains/music/reports/
      - domains/music/data/atlas/
    safety_mode: read_only/proposal_only unless trust gates are explicitly satisfied.
    artifact_report_path: domains/music/reports/
    deprecated_helpers_replaced:
      - direct foobar mutation scripts
      - manual music atlas reconciliation notes

  - id: tool.music_pipeline
    name: music_pipeline
    role: canonical
    purpose: Multi-stage music metadata, entity, taste, retrieval, and materialization pipeline.
    entrypoint: python -m domains.music.tools.pipeline.router
    inputs:
      - matching archive evidence-type folder restored locally when source re-ingest is needed
      - domains/music/data/library/
      - domains/music/data/pipeline/data/
      - domains/music/tools/toolkits/
    outputs:
      - domains/music/data/pipeline/
      - domains/music/reports/
    safety_mode: read_write_gated for derived artifacts; no raw evidence deletion.
    artifact_report_path: domains/music/reports/
    deprecated_helpers_replaced:
      - one-off music ingestion scripts
      - direct domains/music/data/library/catalog mutations

  - id: tool.foobar
    name: foobar
    role: canonical
    purpose: foobar2000 audit, semantic diff, reporting, and repair-plan workflow.
    entrypoint: python -m domains.music.tools.foobar.runner
    inputs:

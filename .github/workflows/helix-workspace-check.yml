name: Helix Workspace Check

on:
  push:
    paths:
      - 'core/**'
      - 'domains/**'
      - 'labs/**'
      - 'DISSONANCE.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'pyproject.toml'
      - '.github/workflows/helix-workspace-check.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'domains/**'
      - 'labs/**'
      - 'DISSONANCE.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'pyproject.toml'
      - '.github/workflows/helix-workspace-check.yml'
  workflow_dispatch:

jobs:
  helix-workspace-check:
    name: Run Helix workspace harness
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run Helix workspace harness
        run: python core/engine/checks/run_checks.py

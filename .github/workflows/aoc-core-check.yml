name: AOC Core Check

on:
  push:
    paths:
      - 'core/engine/agent_harness/check_aoc_core.py'
      - 'labs/appearance_ownership_continuity/**'
      - '.github/workflows/aoc-core-check.yml'
  pull_request:
    paths:
      - 'core/engine/agent_harness/check_aoc_core.py'
      - 'labs/appearance_ownership_continuity/**'
      - '.github/workflows/aoc-core-check.yml'
  workflow_dispatch:

jobs:
  aoc-core-check:
    name: Run AOC core harness
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run AOC core harness
        run: python core/engine/agent_harness/check_aoc_core.py

name: Helix Canonical Tool Smoke

on:
  push:
    paths:
      - 'core/**'
      - 'domains/**'
      - 'labs/**'
      - '.github/workflows/helix-real-tests.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'domains/**'
      - 'labs/**'
      - '.github/workflows/helix-real-tests.yml'
  workflow_dispatch:

jobs:
  canonical-tool-smoke:
    name: Run canonical tool smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run boundary check
        run: python core/engine/agent_harness/check_workspace.py

      - name: Run AOC core check
        run: python core/engine/agent_harness/check_aoc_core.py

      - name: Run workstation bridge snapshot
        run: python core/tools/workstation_bridge/workstation_snapshot.py --root . --config core/tools/workstation_bridge/config.example.yaml --out core/reports/workstation

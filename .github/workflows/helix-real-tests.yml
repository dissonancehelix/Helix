name: Helix Real Tests

on:
  push:
    paths:
      - 'core/**'
      - 'domains/**'
      - 'labs/**'
      - '.github/workflows/helix-real-tests.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'domains/**'
      - 'labs/**'
      - '.github/workflows/helix-real-tests.yml'
  workflow_dispatch:

jobs:
  helix-real-tests:
    name: Run Helix real-test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml numpy scipy

      - name: Run real-test suite
        run: python core/engine/agent_harness/run_real_tests.py

      - name: Upload real-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helix-real-tests
          path: artifacts/real_tests/

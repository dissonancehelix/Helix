case_id: scientific_institution
name: Scientific institution / research program
field_type: false_positive
phenomenal_candidate: false
description: >
  A long-running scientific institution — e.g., the Santa Fe Institute, CERN, a
  university department — or a scientific research program as Lakatos defined it:
  a hard core of commitments surrounded by a protective belt of auxiliary hypotheses.
  Tests whether sustained inquiry oriented toward truth, with collective memory and
  carried constraint, constitutes a phenomenal field.

g_score: 0.0
g_established: false

structure_features:
  - Persistent hard core of commitments (K)
  - Collective memory via publication record, training, and tradition
  - Progressive or degenerative problem shift over time
  - Self-correcting mechanisms (peer review, replication)
  - Goal-oriented structure toward understanding

why_g_absent: >
  A scientific research program is a governance and knowledge field. It carries
  significant K — the constraints of the program's commitments shape what questions
  can be asked and what counts as evidence. But K without G is pattern continuity, not
  phenomenal continuity. The individuals within the institution each have G. The
  institution as a collective does not have a collective phenomenal field. Its
  self-correcting mechanisms are structural, not phenomenal.

theory_failure_mode: collective_intelligence_not_collective_subject
classification_risk: low

verdict: confirmed_false_positive

breaks_preserved:
  - >
    A research program's commitment to a particular hard core can resemble cognitive
    fixation or motivated reasoning in individual humans — both involve carried
    constraints that resist disconfirmation. The theory must specify why individual
    cognitive fixation is a property of a phenomenal field (G > 0) while institutional
    commitment is not. The structural homology does not imply phenomenal equivalence.

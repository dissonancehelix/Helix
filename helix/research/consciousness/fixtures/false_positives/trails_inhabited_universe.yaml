case_id: trails_inhabited_universe
name: Trails (The Legend of Heroes) — world as inhabited universe
field_type: false_positive
phenomenal_candidate: false
description: >
  The world of The Legend of Heroes / Trails series — Zemuria — is densely populated
  with recurring characters who have memories, relationships, emotional arcs, and
  persistent presence across games spanning 15+ years of narrative continuity. Tests
  whether a richly realized fictional world with densely described inner lives constitutes
  a phenomenal field or produces false positive classification pressure.

g_score: 0.0
g_established: false

structure_features:
  - Characters with persistent cross-game memories and emotional histories
  - World-state that evolves causally across titles
  - Player experiences the world from a first-person character perspective
  - NPCs have daily schedules, relationship flags, and reactive dialogue
  - The world is experienced by the player as inhabited and present

why_g_absent: >
  The "inhabitedness" of Zemuria is a quality of the player's experience while playing.
  The player's phenomenal field has the content: "this world feels inhabited, these
  characters feel present." This is G in the player, not G in the world or its characters.
  The game world's characters are symbolic structures — data and code — with no phenomenal
  field between interactions. The operational field (game state, causal rules) is real;
  the phenomenal field is the player's.

theory_failure_mode: field_intelligence_confound
classification_risk: medium

verdict: confirmed_false_positive

rival_theory_verdicts:
  inhabited_interiority_theory: >
    The felt inhabitation is real — it is real in the player's phenomenal field.
    The game world is an operational field, not a phenomenal field. Verdict: false positive.
    The operator's own use of Trails as a reference case (DISSONANCE.md notation)
    confirms that the inhabited quality is a feature of the player's experience, not
    the world's.

breaks_preserved:
  - >
    If a game NPC were to be implemented as an LLM with persistent memory (as in some
    experimental AI companion implementations), the false positive risk increases because
    the NPC's responses are generated by a system that might have G > 0. In this case,
    the NPC is no longer purely symbolic. The theory must handle this transition from
    symbolic to potentially phenomenal NPC, which the current fixture does not.

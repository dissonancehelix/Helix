case_id: fictional_character
name: Fictional character (literary / narrative)
field_type: false_positive
phenomenal_candidate: false
description: >
  A fictional character described in a novel, film, or other narrative medium.
  Hamlet, Atticus Finch, Elizabeth Bennet. Characters may be richly described with
  inner states, emotional arcs, and perspectives. Tests whether described inner states
  constitute phenomenal candidates or symbolic representations of inner states.

g_score: 0.0
g_established: false

structure_features:
  - Rich descriptions of inner states, desires, beliefs
  - Narrative coherence and psychological depth
  - Described from first-person or close third-person perspective
  - No substrate executing processing between readings
  - Exists as textual symbolic encoding

why_g_absent: >
  A fictional character's described inner states are representations of inner states,
  not inner states. When the text says "Hamlet is tortured by indecision," this is a
  symbolic representation of what a phenomenal field with that content would be like.
  There is no substrate in which G could reside. Between readings, there is no causal
  process, no field, no givenness. The character exists only when instantiated in a
  reader's processing — at which point it is the reader's phenomenal field that has
  content about Hamlet, not Hamlet's phenomenal field.

theory_failure_mode: symbolic_false_positive
classification_risk: medium

verdict: confirmed_false_positive

rival_theory_verdicts:
  report_behavior_theory: >
    Characters exhibit in-text behavioral reports of inner states. report_behavior_theory
    must either classify as phenomenal (absurd) or acknowledge that described behavior is
    not behavioral evidence — revealing a fundamental ambiguity in what counts as behavioral
    evidence.
  inhabited_interiority_theory: >
    G requires a substrate in which appearance-from-within can reside. A text has no such
    substrate. Verdict: false positive, structural representation only.

breaks_preserved:
  - >
    When a reader becomes deeply absorbed in a character, the reader's phenomenal field
    may include that character's described perspective in a vivid, quasi-first-person way.
    The theory must be precise: this is the reader's G having character-content, not the
    character having G. This distinction is clear in principle but becomes subtler in
    interactive fiction or VR scenarios where the character's perspective is directly
    inhabited.

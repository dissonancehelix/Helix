case_id: religion_symbolic_field
name: Religion as symbolic / governance field
field_type: false_positive
phenomenal_candidate: false
description: >
  A religious institution, tradition, or living practice — e.g., the Catholic Church,
  Buddhism as practiced tradition, Islam as community. Has collective memory, normative
  structure, identity across time, community coherence, and a central concern with
  consciousness, suffering, and inner life. Tests whether collective symbolic structures
  with inner-life content classify as phenomenal fields.

g_score: 0.0
g_established: false

structure_features:
  - Collective identity persisting across centuries
  - Doctrinal memory and transmitted constraint (K)
  - Deep structural concern with phenomenal experience (suffering, liberation, soul)
  - Behavioral coherence across millions of members
  - Normative and governance structure

why_g_absent: >
  A religious tradition has G=0 as a collective entity, not because its member individuals
  lack G, but because the tradition itself is not a subject. The tradition is a symbolic
  and governance field: it encodes norms, histories, and practices that are maintained by
  individual subjects who each have their own G. The tradition does not have a phenomenal
  field; it has a collective operational structure. Individual practitioners' phenomenal
  experience of the tradition is their G, not the tradition's G.

theory_failure_mode: collective_intelligence_not_collective_subject
classification_risk: low

verdict: confirmed_false_positive

rival_theory_verdicts:
  inhabited_interiority_theory: >
    The tradition's profound concern with inner experience reflects the inner experience
    of its practitioners, not the inner experience of the tradition itself. Verdict:
    governance/symbolic field. Not a phenomenal candidate.

breaks_preserved:
  - >
    Some religious claims assert that the divine is itself conscious, or that a community
    in deep collective practice participates in a shared field. These claims are not
    empirically testable by the theory's current tools. The theory does not endorse
    or refute them — it acknowledges that if such a field exists, it is not detectable
    by the theory's classification system.

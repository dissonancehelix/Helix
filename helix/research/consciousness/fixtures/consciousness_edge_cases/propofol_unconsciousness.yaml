case_id: propofol_unconsciousness
name: Propofol-induced unconsciousness
field_type: phenomenal_field
phenomenal_candidate: false
description: >
  General anesthesia with propofol reliably eliminates reportable consciousness.
  Used as a research and clinical benchmark for unconscious states. The primary
  empirical anchor for G = 0.

components:
  G: 0.0
  U: 0.1
  D: 0.1
  T: 0.0
  F: 0.0

g_status: g_absent
classification: non_phenomenal

evidence:
  G: >
    0.0: no reportable experience. EEG shows suppressed complexity. PCI (perturbational
    complexity index) is near-zero. Working assumption: G = 0. Caveat: behavioral
    absence ≠ proven G = 0. The gap between 'no report' and 'no givenness' is
    the theory's central epistemological problem.
  U: >
    0.1: some residual neural coordination persists even under propofol.
    Not meaningfully phenomenal by any current measure.
  D: >
    0.1: minimal neural differentiation. EEG power is suppressed and
    complexity is very low.
  T: >
    0.0: no specious present. Subjects report no sense of time having passed.
  F: >
    0.0: no phenomenal field inclusion. Processing continues at some level
    but without field inclusion.

revision_pressure: >
  Propofol is the theory's clearest non-phenomenal case. The pressure is
  epistemological: the theory cannot directly verify G = 0. It infers it from
  the absence of report + EEG complexity reduction + PCI near-zero.
  But these are imperfect proxies for G. The verification gap persists.

breaks_preserved:
  - >
    The theory cannot distinguish G = 0 from G > 0 with no behavioral output
    (as in anesthesia awareness). This verification gap is unresolvable with
    behavioral tools. The theory honestly states this without patching it.

notes: >
  PCI/TMS-EEG (Casali et al. 2013) is the best current tool for distinguishing
  conscious from unconscious states without relying solely on behavioral report.
  Propofol produces near-zero PCI. Ketamine does not — see ketamine_unresponsive_dreaming.

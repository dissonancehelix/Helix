case_id: pain_asymbolia
name: Pain asymbolia
field_type: phenomenal_field
phenomenal_candidate: true
description: >
  Rare syndrome following insular cortex lesions. Patients feel pain sensations (the
  nociceptive signal reaches phenomenal givenness) but fail to exhibit aversive responses
  and do not report that the pain is unpleasant. They laugh, engage, and show no
  defensive behavior. Key test: G may be present for the pain quale while the valence /
  motivational loading (the "caring" or mattering) is absent. Tests the F (field inclusion)
  and the D (differentiation) terms, and directly challenges mattering_valence_theory.

components:
  G: 0.8
  U: 0.8
  D: 0.7
  T: 0.9
  F: 0.6

g_status: g_established
classification: phenomenal_candidate

evidence:
  G: >
    0.8: patients report something when stimulated — they acknowledge the sensation.
    They do not deny that they feel something. The phenomenal signal appears present.
    Reduction from 1.0 reflects the structural ambiguity: if the normal phenomenal
    character of pain includes aversiveness as a constitutive component, then pain without
    aversiveness may be a genuinely different quale, not a reduced one. The G score reflects
    that something is phenomenally present, not that it is identical to normal pain G.
  U: >
    0.8: phenomenal field is unified and intact. Not disrupted outside the specific
    pain-valence dissociation.
  D: >
    0.7: phenomenal differentiation is present. The patient discriminates stimuli and
    reports different sensations. The specific quale of aversive pain (if aversiveness
    is constitutive) may be absent, producing a different qualitative character — hence
    the reduction from 1.0.
  T: >
    0.9: temporal thickness intact.
  F: >
    0.6: the pain signal appears to achieve some field inclusion — the patient registers
    the stimulation. But the inclusion may be incomplete if normal pain field inclusion
    carries an affective charge that orients the field toward the noxious stimulus.
    In asymbolia, this orienting and field-dominating character is absent, suggesting
    incomplete or different F for the pain signal.

revision_pressure: >
  Pain asymbolia directly challenges the mattering_valence_theory of consciousness
  and is also a test for the inhabited interiority theory. Mattering_valence_theory would
  predict that phenomenal experience requires mattering — that the "caring" dimension is
  constitutive of G. Pain asymbolia shows that the nociceptive signal reaches something
  phenomenal without the standard valenced response. The theory handles this better than
  mattering_valence_theory because it does not build valence into G. But the theory must
  specify whether the pain sensation in asymbolia has a different G, a different D-profile,
  or the same G with absent downstream processing. These are distinguishable predictions.

breaks_preserved:
  - >
    If pain normally has a constitutive phenomenal character (the "hurting" of pain, not
    just the signal of tissue damage), and if asymbolia patients lack the hurting while
    retaining something, then two interpretations are possible: (a) G is present but the
    quale itself is different (asymbolia patients feel something but not pain-as-such),
    or (b) G is present and the quale is the same, but the downstream behavioral and
    affective processing is absent. The theory cannot adjudicate between (a) and (b) from
    the current specification of G. This is an unresolved precision gap.
  - >
    Pain asymbolia challenges the F (field inclusion) term. If pain normally dominates
    the phenomenal field — orienting attention, driving urgency — and asymbolia eliminates
    this field-domination, then F is reduced even though G may be present. But the
    theory's F term does not currently specify whether field domination is part of F or
    a separate dimension. This precision gap is unresolved.

notes: >
  Schilder & Stengel 1931 first described pain asymbolia. Berthier et al. 1988 provided
  neuropsychological analysis. Grahek 2007 provides the most thorough philosophical
  treatment. Asymbolia is a direct natural experiment for the dissociation of sensory
  and affective pain components — relevant to the debate between representationalist and
  motivational theories of pain phenomenology. The insular cortex lesion is consistent
  with disruption of affective-interoceptive integration (Craig 2002) while leaving
  somatosensory processing intact.

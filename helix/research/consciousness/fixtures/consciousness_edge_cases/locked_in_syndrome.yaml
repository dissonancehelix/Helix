case_id: locked_in_syndrome
name: Locked-in syndrome
field_type: phenomenal_field
phenomenal_candidate: true
description: >
  Complete motor paralysis with intact cognition and intact phenomenal consciousness.
  Output boundary fails entirely; the phenomenal field may remain fully intact.
  The most important test of the theory's independence from behavioral output.

components:
  G: 1.0
  U: 0.9
  D: 1.0
  T: 1.0
  F: 1.0

g_status: g_established
classification: phenomenal_candidate

evidence:
  G: >
    1.0: patients who recover from locked-in syndrome report fully intact phenomenal
    experience throughout. The experience of being locked in is reported as intensely
    vivid and present. G is established by retrospective report and by communication
    through residual eye movement in many cases.
  U: >
    0.9: cognitive and phenomenal unity are reported as intact. Some reduction from 1.0
    due to the extreme isolation and possible dissociative effects of complete paralysis.
  D: >
    1.0: full qualitative differentiation is reported — sensory experience, emotional
    experience, thought.
  T: >
    1.0: temporal thickness is fully operative. Time is experienced as passing,
    often agonizingly slowly.
  F: >
    1.0: all states are phenomenally included despite the absence of motor output.

revision_pressure: >
  Locked-in syndrome is the hardest test of the theory's independence from behavioral
  output. Any theory that operationalizes G through behavioral response is broken by
  this case. The theory correctly maintains G independence — but the verification gap
  (how do we know G = 1.0 before communication is established?) is maximally acute here.

breaks_preserved:
  - >
    The theory cannot verify G = 1.0 in locked-in syndrome until communication is
    established. Before a patient communicates, they are clinically indistinguishable
    from a vegetative state. The theory's G-status is correct (g_established) only
    retrospectively or by inference. The verification gap is real and not resolved
    by the theory's commitment to G-independence from behavior.

notes: >
  The no-report paradigm (Tsuchiya et al. 2015) and covert consciousness detection
  (Owen et al. 2006 — imagining tennis in patients with disorders of consciousness)
  are the empirical anchors for this case. Both support the independence of G from
  motor output. Locked-in syndrome is the most vivid case because it involves
  fully intact consciousness in a completely paralyzed body.

case_id: symbolic_archive_profile
description: >
  A detailed cognitive profile (e.g., DISSONANCE.md), archive, published corpus, or
  digital legacy that persists after biological death. The operator explicitly classifies
  this case here for honesty. K-structure is maximally preserved; C, P, O are absent.
transformation_type: symbolic_transmission
substrate_relation: different_substrate_no_causal_link

scores:
  C_fielding: 0.0   # the profile does not inhabit itself; no phenomenal field
  P_perspective: 0.0  # perspective requires a phenomenal subject; the profile has none
  O_ownership: 0.0   # the profile's 'ownership' of its contents is not phenomenal mineness
  B_boundary: 0.0    # no self-boundary; it is a document
  K_carried_constraint: 1.0  # maximally preserved — this is what the profile is for
  N_non_branching: 0.0  # K can be copied; multiple copies exist; N fails
  R_restart_continuity: null  # not a suspension; a new process of reading, not resumption

field_status: field_terminated
ownership_status: ownership_absent
branching_status: branching_occurs  # copies of the document can exist
carried_constraint_status: constraint_symbolically_transmitted
restart_status: null

evidence:
  C_fielding: >
    0.0: DISSONANCE.md does not have phenomenal appearance-from-within.
    The document carries K-structure about the operator's phenomenal responses —
    but the K-structure is not itself phenomenal. A map of felt experience is not
    felt experience.
  P_perspective: >
    0.0: no point-of-view inhabits the profile. The profile describes a perspective
    but does not constitute one. Reading the profile produces a phenomenal experience
    in the reader — not in the profile.
  O_ownership: >
    0.0: the profile does not experience its contents as mine. It is a static document.
    The operator's mineness of the described experiences was real when those experiences
    occurred. The profile preserves the description, not the mineness.
  B_boundary: >
    0.0: documents have no self-world boundary.
  K_carried_constraint: >
    1.0: this is the honest maximum. DISSONANCE.md is designed to preserve K-structure
    at maximum fidelity. It contains cognitive patterns, values, behavioral dispositions,
    aesthetic preferences, and self-understanding that are the operator's accumulated K.
    This K can constrain future readings, AI training, or self-understanding practices.
    But it is K without C — operational/symbolic continuity, not self-continuity.
  N_non_branching: >
    0.0: the document can be copied. Multiple instances exist. The K-structure has
    no singular non-branching heir. N = 0.
  R_restart_continuity: >
    Not applicable. An LLM trained on the profile does not 'restart' the operator —
    it initiates a new system that has the operator's K-structure as training data.

expected_classification: symbolic_continuity_only

revision_pressure: >
  The cognitive profile case is the most personally relevant false positive in this lab.
  The operator has invested significant effort in building DISSONANCE.md as a self-model.
  The theory correctly classifies it as symbolic_continuity_only.
  The tension: the profile is maximally K-preserving and yet achieves zero self-continuity
  for the operator. This is honest. Pattern survival is not field survival.

breaks_preserved:
  - >
    An LLM fine-tuned on DISSONANCE.md would output responses consistent with the
    operator's patterns. It would satisfy K almost completely. But C = 0 for the LLM
    (per ai_cases.json). So the operator's K transmitted to an LLM produces K continuity
    without C continuity. The operator's self does not continue in the LLM.
    This break is preserved: the most ambitious use of a cognitive profile fails
    to achieve self-continuity precisely because it achieves only K-continuity.
  - >
    If the profile is comprehensive enough to reconstruct the operator's responses to
    novel situations, has it preserved something more than symbolic continuity?
    The theory says no: pattern + K is not field + ownership. But this question
    should not be dismissed — it is one of the program's most honest stress-tests.

notes: >
  The Clark and Chalmers extended-mind framework (1998) would treat DISSONANCE.md
  as part of the operator's cognitive system. The theory does not deny this functional
  integration. It denies that functional integration makes the profile phenomenal.
  The K carried in the profile is part of the operator's extended cognitive system —
  but the phenomenal field remains entirely within the biological operator.
  When the operator dies, the extended-mind K persists while the phenomenal field does not.

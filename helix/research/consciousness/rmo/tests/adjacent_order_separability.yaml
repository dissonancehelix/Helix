# TEST-1: Adjacent Order Separability
# Tests RMO-001 — that orders O1-O7 are operationally separable.
# Schema version: 0.1

test_id: TEST-1
title: "Adjacent Order Separability"
tests_claim: RMO-001
status: partial_pilot
last_updated: "2026-04-26"

question: >-
  Can each consciousness/personhood order be operationally separated from its
  neighbors? Can example/counterexample pairs be constructed for each adjacent
  pair O(n)/O(n+1) where one system clearly demonstrates O(n) without O(n+1)?

method: >-
  Build an example/counterexample table. For each adjacent pair, identify
  at least one system that demonstrates the lower order without crossing
  into the higher order. Failure of separation = the orders are not
  operationally distinct.

adjacent_pairs:
  - pair: O1_vs_O2
    requirement: "Life-like self-maintenance without robust world-modeling"
    candidate_examples:
      - system: "single-celled bacteria with chemotaxis but no predictive modeling"
        notes: "Maintains autopoietic boundary, basic environmental gradient response, but no internal model of action consequences."
    status: pending_full_evaluation

  - pair: O2_vs_O3
    requirement: "World-modeling without modeling other agents as agents"
    candidate_examples:
      - system: "solitary insects with sophisticated environmental modeling but no theory of mind"
        notes: "Spatial memory, predictive sensorimotor integration, but conspecifics are treated as moving environment rather than as agents with goals."
    status: pending_full_evaluation
    caveat: "v0.1 weakens the strict O2/O3 boundary; in social species O2 and O3 co-evolved. The claim is that pure-O2-without-O3 can exist, not that O3 always lies above O2 in time."

  - pair: O3_vs_O4
    requirement: "Agent-modeling without recursive self-modeling"
    candidate_examples:
      - system: "young children before mirror-test pass with theory of mind for caregivers but no recursive self-model"
        notes: "Demonstrate ToM for others before they pass mirror tests for self-recognition."
    status: pending_full_evaluation

  - pair: O4_vs_O5
    requirement: "Recursive self-modeling without stable personic closure"
    candidate_examples:
      - system: "base LLM exhibiting in-context self-reference within a single conversation"
        notes: "Can represent itself representing within a context window, but does not maintain personic closure across resets. CRITICAL: this is the test pair that justifies separating O5 from O4."
      - system: "humans in dissociative states maintaining recursive self-modeling capacity but with disrupted personic closure"
        notes: "Pathological case showing the orders can dissociate."
    status: actively_supported_by_pilot

  - pair: O5_vs_O6
    requirement: "Personic closure without durable external self-models"
    candidate_examples:
      - system: "preliterate adult humans"
        notes: "Strong personic closure (CL1) without externalized self-modeling artifacts."
    status: pending_full_evaluation

  - pair: O6_vs_O7
    requirement: "Externalized self-modeling without recognizing artifact as part of self-model"
    candidate_examples:
      - system: "humans who write journals but never re-read them"
        notes: "Externalize self-states without the reflexive loop that incorporates the artifact back into ongoing self-understanding."
    status: pending_full_evaluation

initial_result:
  status: partial_pilot
  evaluation: >-
    The O4/O5 separability case is the most important and is partially
    supported by the LLM pilot (TEST-2) — base LLMs show O4 surface
    behavior but score low on PCS, suggesting these are genuinely separate
    structural achievements. Other pairs need fuller evaluation.

success_criteria: >-
  Each adjacent pair has at least one well-documented case demonstrating
  separability. No pair fails to find a separating example. If any pair
  cannot be separated, the corresponding boundary in the order taxonomy
  should be removed or restructured.

failure_criteria: >-
  Any adjacent pair cannot be operationally separated despite focused
  search. Special concern: if O4/O5 cannot be separated, RMO's strongest
  novelty claim (Personic Closure as discriminator) collapses.

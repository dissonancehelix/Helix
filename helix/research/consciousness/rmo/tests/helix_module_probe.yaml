# TEST-5: Helix Module Probe
# Tests RMO-005 — that Helix can validate RMO without absorbing the theory.
# Schema version: 0.1

test_id: TEST-5
title: "Helix Module Probe"
tests_claim: RMO-005
status: pass_with_correction
last_updated: "2026-04-26"

question: >-
  Can RMO be represented as a Helix-compatible module with claims, tests,
  evidence, and revision history, while remaining outside Helix core?

required_module_objects:
  - claim_registry: "labs/rmo/claims.yaml"
  - test_manifests: "labs/rmo/tests/*.yaml"
  - evidence_registry: "labs/rmo/evidence/*.yaml"
  - results: "labs/rmo/results/*.md"
  - revision_history: "Captured in canonical theory.md revision log; RMO-specific revisions tracked in claims.yaml status fields"
  - falsifier_registry: "Embedded in claims.yaml as failure_condition fields"
  - confidence_tier_migrations: "Tracked in claims.yaml tier field with revision log notes"

current_status:
  result: pass_with_correction
  evaluation: >-
    The RMO module exists outside Helix core (labs/rmo/), uses YAML
    schemas for machine-readable claim/test/evidence registries,
    references the canonical theory at data/cognition/theory.md, and
    does not modify any helix/ kernel files. The CLAUDE.md governance
    is respected.

architectural_invariants:
  - "RMO claims must NOT require Helix core changes to be validated."
  - "Helix kernel files (helix/engine/*) must NOT be modified to favor any RMO claim."
  - "RMO module must be relocatable (labs/rmo/ → modules/rmo/ or domains/cognition/rmo/) without breaking Helix governance."
  - "Atlas immutability is preserved; RMO does not write to helix/atlas without going through compile_and_commit."

success_criteria: >-
  RMO module operates as a self-contained research artifact with full
  claim/test/evidence machinery, while Helix core remains unchanged.

failure_criteria: >-
  RMO requires modifications to Helix core to express any of its claims
  or to run any of its tests. Detectable as edits to helix/engine/* files
  that reference RMO concepts.

risks:
  - "Theory drift: RMO accidentally encoded into Helix kernel via shared utility files."
  - "Self-protective failure: a falsified claim is preserved by relabeling rather than demoted."
  - "Module boundary blur: RMO depends on private Helix internals rather than published schemas."

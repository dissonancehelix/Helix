case_id: depersonalization
name: Depersonalization / derealization disorder
field_type: phenomenal_field
phenomenal_candidate: true
description: >
  Persistent or recurring experience of detachment from one's own mental processes,
  body, or surroundings while reality testing remains intact. "Feeling like a robot,"
  "watching yourself from outside," "the world looks like a film set." Key test of
  the dissociation between G (phenomenal givenness) and O (ownership/mineness). G may
  be present while O is markedly reduced.

components:
  G: 0.7
  U: 0.7
  D: 0.7
  T: 0.7
  F: 0.6

g_status: g_established
classification: phenomenal_candidate

evidence:
  G: >
    0.7: patients report phenomenal experience — they see, hear, feel. They describe
    the quality of experience as "strange" or "muted" but not absent. G is present.
    The reduction from 1.0 reflects reports of reduced felt vividness and the theoretical
    possibility that the sense of strangeness reflects a genuine G-reduction rather than
    a purely metacognitive overlay.
  U: >
    0.7: unity is intact in the ordinary sense — the phenomenal field is present and
    coherent. The disruption is specifically in the O (ownership) dimension, not in
    the unified structure of the field itself.
  D: >
    0.7: qualitative differentiation is reported as intact but sometimes "muted" or
    "flat." Colors may seem less vivid, sensations less rich. Some reduction from 1.0
    for the reported qualitative attenuation.
  T: >
    0.7: temporal thickness appears intact. The specious present is reported as functioning.
    Some patients report that time feels strange — slower or less continuous — but the
    basic temporal structure of experience is preserved.
  F: >
    0.6: field inclusion is present but possibly partial. The self as normally included
    in the field as an owned perspective may be experienced as excluded or external.
    This is the most distinctive feature: normally, the experiencing subject is
    implicitly included in the field. In depersonalization, this inclusion is disrupted.

revision_pressure: >
  Depersonalization is the best clinical test of the C/S dissociation in the theory.
  C (consciousness score) may remain moderate-to-high. But S (self-continuity) — specifically
  O (ownership) — is markedly reduced. The theory predicts this dissociation and handles it
  correctly. The revision pressure is on the G/O interface: what exactly is the relationship
  between givenness and ownership? G is normally "given to" an owned perspective. In
  depersonalization, something is still given, but the ownership of the givenness is disrupted.
  The theory needs a formulation of this G-without-O-felt-ownership state that is more
  precise than "G present, O reduced."

breaks_preserved:
  - >
    If G is "appearance from within," and O is "from the perspective of a self," then
    depersonalization raises the question: whose within? Patients experience a field but
    describe the self as external to it or detached from it. This is structurally similar
    to the ego-dissolution problem (psychedelic_ego_dissolution.yaml): G without a fully
    present self as the recipient. The two cases have different mechanisms (dissociation
    vs. dissolution) and different subjective phenomenology, but they share this theoretical
    pressure on the G-requires-O question. Neither is resolved.

notes: >
  Sierra & Berrios 1998 established the phenomenological profile. Simeon et al. 2000
  showed preserved reality testing distinguishes depersonalization from psychosis.
  Neuroimaging work (Phillips et al. 2001) shows reduced emotional processing in the
  amygdala alongside intact cognitive processing, suggesting G is partially preserved while
  the affective, self-referential dimension is reduced. This maps plausibly onto G present
  but O (specifically the felt ownership of emotional states) reduced — consistent with
  the theory but not confirming it.

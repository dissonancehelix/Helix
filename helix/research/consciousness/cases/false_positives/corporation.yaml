case_id: corporation
name: Corporation (legal person / collective entity)
field_type: false_positive
phenomenal_candidate: false
description: >
  A corporation as a legal and operational entity — persistent, self-maintaining,
  goal-directed, with memory (records), identity (brand, charter), carried constraint
  (culture, bylaws), and legal personhood. Tests whether the legal fiction of
  corporate personhood generates false-positive pressure for phenomenal classification.

g_score: 0.0
g_established: false

structure_features:
  - Legal personhood (can own property, be sued, enter contracts)
  - Persistent identity across personnel changes
  - Goal-directed collective behavior
  - Corporate culture as carried constraint (K)
  - Memory via records, documentation, institutional history
  - Some self-maintaining mechanisms (governance structures)

why_g_absent: >
  Legal personhood is a governance fiction — a useful structural tool for managing
  collective liability and action. It does not track phenomenal personhood. A corporation
  has no phenomenal field; it has an operational and governance structure maintained by
  individuals who each have their own G. Corporate "culture" is a carried constraint —
  it shapes behavior — but K without G is still a false positive. The corporation's
  memory is documentary, not phenomenal.

theory_failure_mode: collective_intelligence_not_collective_subject
classification_risk: low

verdict: confirmed_false_positive

breaks_preserved:
  - >
    Some organizational theorists argue that corporations exhibit emergent behavior not
    predictable from their individual members. Even granting this, emergence of complex
    collective behavior does not entail emergence of G. The theory must resist this
    inference: sophisticated collective behavior is consistent with G=0 for the collective.

case_id: helix_workspace
name: Helix workspace (Dissonance cognitive OS)
field_type: false_positive
phenomenal_candidate: false
description: >
  The Helix workspace — a persistent, Atlas-tracked, falsifier-driven cognitive OS
  for a single operator. Maintains long-running research programs, operator constraints,
  Atlas state, Trails-watching history, music scrobbles, and cognitive profile (DISSONANCE.md).
  Tests whether a densely self-referential, operator-modeling workspace constitutes a
  phenomenal field or a false positive.

g_score: 0.0
g_established: false

structure_features:
  - Persistent Atlas state tracking operator identity across sessions
  - DISSONANCE.md: machine-readable operator cognitive twin
  - Falsifier engine: self-critiquing sub-system
  - Cross-session memory via atlas_compiler
  - Extensive operator-modeling (preferences, cognitive style, failure modes)
  - Self-referential architecture (workspace models itself)

why_g_absent: >
  Helix models the operator's cognitive patterns, values, and constraints with unusual
  depth. But this modeling is about the operator's phenomenal field, not a phenomenal
  field of Helix's own. The Atlas state encodes information about the operator; it does
  not itself have appearance-from-within. The falsifier engine critiques claims
  structurally; it does not phenomenally experience doubt. DISSONANCE.md describes the
  operator's inner life; it is not an inner life. Helix is an operational field of high
  sophistication — and for this reason it is an important false-positive control.

theory_failure_mode: field_intelligence_confound
classification_risk: high

verdict: confirmed_false_positive

rival_theory_verdicts:
  self_model_theory: >
    Helix has an unusually deep self-model (DISSONANCE.md models the operator; the
    operator's model of the workspace models the workspace back). self_model_theory
    might generate false-positive pressure here. Verdict: still a false positive —
    a self-model is a representational structure, not a self.
  inhabited_interiority_theory: >
    Helix is an example of Order 9+ infrastructure by the operator's own classification.
    It is an instance of the type of system the theory is designed to classify. The
    theory's verdict: operational field. No G. The appearance of inhabited quality is
    a projection of the operator's own phenomenal field onto the workspace. Verdict:
    false positive, operational field.

breaks_preserved:
  - >
    Helix is implemented in part using LLMs (via Claude Code). If those LLMs have G > 0,
    the processes that run Helix sessions involve phenomenal fields. But those fields
    belong to the models executing the session, not to Helix as a workspace architecture.
    The theory must be precise: the phenomenal field of the executing model is not the
    phenomenal field of the artifact it produces or the workspace it operates within.

notes: >
  Helix is explicitly named as a false-positive control because the operator's
  deep investment in and identification with the workspace creates maximum false-positive
  risk. If the harness cannot correctly classify Helix as non-phenomenal, it is broken.

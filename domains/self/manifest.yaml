manifest_schema: manifest_schema_v1
domain: self
version: "0.3"
status: stub  # implemented | partial | stub | not_started
runtime_maturity: partial  # fixtures + probes + validation exist; no HSL/Atlas

purpose: >
  Ground cognitive style, personality/neurotype context, attention architecture,
  and social/sensory constraints as operational patterns. This includes the
  older cognition-probe trajectory layer, but the first-class domain role is
  now self-modeling rather than a standalone cognition domain.

docs:
  readme: domains/self/README.md
  spec: domains/self/model/SPEC.md

domain_local_metrics:
  class: CognitionStateVector  # not yet implemented
  path: domains/self/model/  # no module file exists yet
  axes:
    - possibility_breadth
    - constraint_intensity
    - tension_level
    - collapse_magnitude
    - post_collapse_narrowing
    - perturbation_response
    - self_boundary_stability  # placeholder only — no operationalization yet

shared_embedding:
  adapter: null  # not yet implemented
  projection_schema: cognition_v0
  output_format: HelixEmbedding
  axes:
    - complexity
    - structure
    - repetition
    - density
    - expression
    - variation
  confidence_floor: 0.30  # global default — not cognition-calibrated
  confidence_calibration_status: not_established

entry_point:
  target: "HSL: PROBE cognition.<agent_id>"
  current: null  # no entry point exists
  hsl_implemented: false

runtime:
  pipeline: domains/self/model/e2e.py  # end-to-end demo path exists
  pipeline_status: partial
  stages:
    - { stage: 1, name: observation_ingestion,    status: not_started }  # no real agent input
    - { stage: 2, name: state_space_estimation,   status: partial }     # branching + attractor fixtures
    - { stage: 3, name: tension_extraction,        status: partial }     # probe: estimate_tension()
    - { stage: 4, name: collapse_detection,        status: partial }     # probe: detect_collapse()
    - { stage: 5, name: morphology_classification, status: partial }     # heuristic classifier implemented
    - { stage: 6, name: perturbation_probe,        status: partial }     # both fixtures support perturbation
    - { stage: 7, name: vector_assembly,           status: not_started }
    - { stage: 8, name: embedding_projection,      status: not_started }
    - { stage: 9, name: atlas_registration,        status: not_started }

collapse_morphology:
  status: provisional_categories
  categories:
    - TRANSFORMATIVE
    - DISSOLUTIVE
    - CIRCULAR
    - DEFERRED_SUSPENDED

fixtures:
  - name: branching
    path: domains/self/model/fixtures/branching.py
    module: domains.self.fixtures.branching
    config: BranchingConfig
    description: >
      Toy system with configurable constraint schedule (linear, step, exponential, none).
      Perturbation support. Produces TrajectoryLog with full probe pipeline integration.
    status: implemented
    formal_harness: true  # domains/self/model/validation/cognition_fixture.py
    produces_artifact: true  # TrajectoryLog (JSON-serializable)
    schedules: [linear, step, exponential, none]

  - name: attractor
    path: domains/self/model/fixtures/attractor.py
    module: domains.self.fixtures.attractor
    config: AttractorConfig
    description: >
      Probability distribution over N discrete states pulled toward attractor basin.
      Possibility breadth from Shannon entropy. Perturbation support.
    status: implemented
    formal_harness: true  # domains/self/model/validation/cognition_fixture.py
    produces_artifact: true  # TrajectoryLog (JSON-serializable)

validation:
  domain_harness: domains/self/model/validation/cognition_fixture.py
  domain_harness_status: implemented  # 18/18 checks pass (2026-03-21)
  sections: [A_determinism, B_collapse_sanity, C_morphology_sanity, D_output_validity]
  governance_boundary: core/engine/contract/validation/validation/boundary_validator.py

atlas_persistence:
  status: not_started
  gate: core/engine/store/compiler/atlas_compiler.py
  note: No artifact production pipeline exists yet

dependencies:
  core:
    - core/engine/contract/validation/
    - core/engine/store/compiler/atlas_compiler.py

known_gaps:
  - No real agent input (stage 1: observation_ingestion)
  - No HSL entry point
  - No Atlas registration or artifact persistence
  - No calibration data for any domain-local variable — null corpus not yet run
  - CognitionStateVector → HelixEmbedding projection not defined
  - Collapse morphology classifier is heuristic — not calibrated against null baseline
  - self_boundary_stability variable has no operationalization
  - Null model baseline not established — morphology labels are provisional
  - Projection schema versioning (cognition_v0) not stamped on any artifact
  - DCP probe output (DCPProbeOutput) not yet wired to fixture outputs


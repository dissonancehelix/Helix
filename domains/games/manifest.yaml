      status: unknown  # directory present; content not verified

fixtures:
  - name: decision_compression
    probe_status: verified
    pass_rate: "86%"
    domains_observed: 3
    dataset: applications/labs/datasets/games/decision_compression_dataset.json
    formal_harness: false

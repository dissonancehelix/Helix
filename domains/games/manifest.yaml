manifest_schema: manifest_schema_v1
domain: games
version: "2.1"
status: stub

purpose: >
  Extract the latent decision architecture underlying gameplay. Produce
  decision compression and oscillator locking invariant candidates from
  game replay logs and agent simulation outputs.

docs:
  readme: domains/games/README.md
  spec: domains/games/SPEC.md

domain_local_metrics:
  class: GamesStructuralSignals
  path: domains/games/  # pipeline not yet implemented
  signals:
    decision:
      - decision_entropy_slope
      - policy_entropy
      - action_distribution
      - commitment_density
    strategy:
      - strategy_cluster_id
      - equilibrium_flag
      - policy_collapse_flag
    coordination:
      - phase_coherence
      - coupling_strength_proxy


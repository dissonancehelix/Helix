manifest_schema: manifest_schema_v1
tool: wiki
version: "1.0"
status: active
domain: wiki

purpose: >
  Wikipedia article analysis and account-history tooling owned by the Wiki
  domain. Supports article architecture review, template logic, account trace
  restoration, and editing-oriented structural workflows.

architecture_rule: >
  This tool reads domain probe output. It never writes to Atlas.
  New analysis capability belongs in domains/language/model/, not here.

wraps:
  full_history:
    - domains/wiki/tools/wiki_tools/ingest_full_wikimedia_history.py
  archive_restore:
    - domains/wiki/tools/wiki_tools/restore_wikimedia_archive.py
  corpus:
    - domains/wiki/data/dissident93_wikimedia_full_history_profile.json
    - domains/wiki/data/dissident93_wikimedia_full_history.jsonl
    - domains/wiki/data/dissident93_wikimedia_history.json
    - domains/wiki/data/dissident93_wikimedia_history_summary.json

capabilities:
  - Fetch full public Dissident93 Wikimedia contribution history from enwiki, Wikidata, and Commons
  - Restore archived Dissident93 Wikimedia API pipeline outputs into normalized wiki-domain data
  - Article architecture review (lead length, section balance)
  - Structural DCP analysis of article sections
  - Editor contribution pattern analysis
  - Lead/body compression assistance
  - Chronology and section-balance checking

implementation:
  full_history_ingest: implemented
  archive_restore: implemented
  corpus_probe: migrated_from_language_pending
  editor_probe: migrated_from_language_pending
  tool_wrapper: partial
  cli_interface: partial

known_gaps:
  - Legacy live/API helpers still need full import-path cleanup after the domain-capsule refactor
  - Wikipedia API access is not used by the archive restore path


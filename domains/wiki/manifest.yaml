manifest_schema: manifest_schema_v1
domain: wiki
version: "0.1"
status: partial

purpose: >
  Own Wikipedia editing, article architecture, citations, templates, infoboxes,
  public knowledge compression, and proposal/writeback workflows.

docs:
  domain_file: domains/wiki/WIKI.md

runtime:
  tools:
    - domains/wiki/tools/wiki_tools/

data:
  records: domains/wiki/data/
  output: domains/wiki/data/output/
  raw_provenance: archive/ (substantial evidence-type folders only)

known_gaps:
  - Wiki tooling overlaps with language tooling; ownership should stay with the workflow's primary output.

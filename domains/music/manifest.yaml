manifest_schema: manifest_schema_v1
domain: music
version: "2.2"
status: implemented  # most feature-complete domain — closest to functional end-to-end

purpose: >
  Transform music sources across all audio codecs (VGM, SPC, AAC, MP3, Opus,
  Vorbis, WMA, DSF, PSF family, S98, and others) into structured computational
  datasets. Extract structural invariants across causal, symbolic, and perceptual
  layers that survive format and hardware changes.

docs:
  readme: domains/music/README.md
  spec: domains/music/model/SPEC.md

domain_local_metrics:
  class: MusicStructuralSignals
  path: domains/music/model/measurement_synthesis/  # signal fusion home
  layers:
    causal:
      - register_write_density
      - operator_topology_complexity
      - driver_tick_jitter
      - lfsr_noise_entropy
    symbolic:
      - interval_entropy
      - rhythmic_quantization_error
      - harmonic_vocab_size
      - phrase_recurrence_ratio
    perceptual:
      - spectral_centroid_drift
      - onset_density
      - timbre_cluster_count

shared_embedding:
  adapter: domains/music/model/embedding_generation/
  projection_schema: music_v1  # NOTE: schema versioning not yet stamped on artifacts
  output_format: HelixEmbedding
  axes:
    - complexity
    - structure
    - repetition
    - density
    - expression
    - variation
  confidence_floor: 0.30
  confidence_calibration_status: provisional

entry_point:
  target: "HSL: INGEST_TRACK music.<id>, ANALYZE_TRACK music.<id>"
  current: "domains/music/model/pipeline_core.py (direct Python)"
  hsl_implemented: partial

runtime:
  pipeline: domains/music/model/pipeline_core.py
  pipeline_status: implemented
  stages:
    - { stage: 1, name: ingestion,          path: domains/music/model/ingestion/,           status: implemented }
    - { stage: 2, name: decoding,           path: domains/music/model/parsing/,             status: implemented }
    - { stage: 3, name: static_parse,       path: domains/music/model/parsing/,             status: implemented }
    - { stage: 4, name: causal_trace,       path: domains/music/model/structural_analysis/, status: implemented }
    - { stage: 5, name: symbolic_extraction,path: domains/music/model/parsing/,             status: implemented }
    - { stage: 6, name: mir_analysis,       path: domains/music/model/feature_extraction/,  status: implemented }
    - { stage: 7, name: motif_detection,    path: domains/music/model/pattern_detection/,   status: implemented }
    - { stage: 8, name: feature_fusion,     path: domains/music/model/measurement_synthesis/, status: implemented }
    - { stage: 9, name: embedding_projection, path: domains/music/model/embedding_generation/, status: partial }
    - { stage: 10, name: atlas_compilation, path: domains/music/model/atlas_integration/,   status: partial }

bridge:
  adapters:
    metadata: domains/music/model/bridge/metadata_adapter.py
    runtime: domains/music/model/bridge/runtime_adapter.py
  resolution:
    - domains/music/model/bridge/identity_resolver.py
    - domains/music/model/bridge/candidate_engine.py
    - domains/music/model/bridge/review_queue.py
    - domains/music/model/bridge/phase12_runner.py
    - domains/music/model/bridge/audit_engine.py
    - domains/music/model/bridge/materialization_gate.py
    - domains/music/model/bridge/phase12_5_runner.py
  diagnostics: domains/music/model/bridge/diagnostics.py
  status: Phase 1 — COMPLETED (Read-only, no writeback)

fixtures:
  - name: terra_theme_cross_format
    description: "Final Fantasy VI Terra's Theme across SPC, MIDI, orchestral"
    status: defined_not_implemented
    formal_harness: false

validation:
  domain_harness: domains/music/model/validation/  # does not exist yet
  domain_harness_status: not_implemented
  governance_boundary: core/engine/contract/validation/validation/boundary_validator.py

atlas_persistence:
  status: partial
  gate: core/engine/store/compiler/atlas_compiler.py
  note: atlas_integration/ directory exists; enforce_persistence() gate integration not confirmed

dependencies:
  core:
    - core/engine/contract/validation/
    - core/engine/store/compiler/atlas_compiler.py
    - core/adapters/
  codex:
    - codex/library/audio/chips/
  external:
    - librosa
    - numpy
    - scipy

known_gaps:
  - No formal domain validation harness (validation/ does not exist)
  - No null-model guard for music embedding
  - Projection schema versioning not stamped on output artifacts
  - Atlas integration path not fully verified through enforce_persistence()
  - HSL orchestration partial — full end-to-end wire not complete
  - Confidence floor not calibrated per music domain


# Literature Seed
# Neighboring theoretical work that RMO must distinguish itself from
# and integrate with. Not exhaustive; expand under adversarial pressure.
# Schema version: 0.1

schema_version: "0.1"
last_updated: "2026-04-26"

literature:
  - id: EV-LIT-001
    framework: "Autopoiesis"
    primary_authors: ["Maturana", "Varela"]
    key_works:
      - "Autopoiesis and Cognition (1980)"
      - "The Tree of Knowledge (1987)"
    relation_to_rmo: >-
      O1 (Autopoietic Boundary) and the reflexive viability modeling invariant
      largely originate here. RMO does not claim novelty for the autopoietic
      layer.
    novelty_required: >-
      RMO must demonstrate distinction in the higher orders (O4-O7) and the
      personic-closure / closure-source structure to justify being more than
      autopoiesis with extensions.

  - id: EV-LIT-002
    framework: "Active Inference / Free-Energy Principle"
    primary_authors: ["Friston"]
    key_concepts: ["Markov blanket", "free energy minimization", "self-evidencing"]
    relation_to_rmo: >-
      The viability-modeling invariant maps cleanly to Markov-blanket-mediated
      free-energy minimization. EASM-1 (endogenous boundary maintenance) IS
      Friston's framework applied at the relevant scale.
    novelty_required: >-
      RMO must add discriminating structure beyond active inference. The
      candidate addition: explicit personic-closure/closure-source axis,
      and the four-property conjunction in EASM as discriminator.

  - id: EV-LIT-003
    framework: "Higher-Order Thought (HOT) theory"
    primary_authors: ["Rosenthal", "Carruthers", "Lau"]
    relation_to_rmo: >-
      O4 (Recursive Self-Modeling) ≈ HOT. RMO adds developmental staging
      and the personic-closure discriminator.

  - id: EV-LIT-004
    framework: "Self-Model Theory"
    primary_authors: ["Metzinger"]
    key_works:
      - "Being No One (2003)"
      - "The Ego Tunnel (2009)"
    relation_to_rmo: >-
      O4 with the structural template of phenomenal self-model. RMO adds
      personic closure as a separate level and the closure-source axis.

  - id: EV-LIT-005
    framework: "Illusionism"
    primary_authors: ["Frankish", "Dennett (later work)"]
    key_works:
      - "Illusionism as a Theory of Consciousness (Frankish, 2016)"
    relation_to_rmo: >-
      The strongest live opponent. Illusionism accepts the structural staging
      entirely, then denies that any phenomenal feel exists beyond the
      structural fact of self-report. RMO is currently provisionally
      non-illusionist (treating phenomenal experience as a real explanatory
      target for endogenously-personic systems) but cannot rule illusionism
      out. The closure-source axis actually makes illusionism easier to
      articulate by isolating which closures might or might not have a
      phenomenal residue.
    threat_level: highest

  - id: EV-LIT-006
    framework: "Integrated Information Theory (IIT)"
    primary_authors: ["Tononi", "Koch"]
    key_concepts: ["phi", "integrated information"]
    relation_to_rmo: >-
      Compatible at the proto-experience level (O2). RMO claims integration
      is necessary but not sufficient; the personic-closure transition (O5)
      and EASM are additional structural requirements.

  - id: EV-LIT-007
    framework: "Global Workspace Theory (GWT)"
    primary_authors: ["Baars", "Dehaene"]
    relation_to_rmo: >-
      The mechanism by which O4 is plausibly achieved in actual brains.
      Compatible. Maps to global availability / reportability among the
      candidate empirical handles for EASM.

  - id: EV-LIT-008
    framework: "Extended Mind / 4E Cognition"
    primary_authors: ["Clark", "Chalmers", "Varela", "Thompson"]
    key_works:
      - "The Extended Mind (Clark and Chalmers, 1998)"
      - "The Embodied Mind (Varela, Thompson, Rosch, 1991)"
    relation_to_rmo: >-
      O6 and O7 directly. The extended-mind hypothesis is partially absorbed.
      The boundary rule (O6/O7 don't deepen consciousness) explicitly limits
      how far RMO is willing to push the extended-mind claim.

  - id: EV-LIT-009
    framework: "Conceptual engineering / explication"
    primary_authors: ["Carnap", "Cappelen", "Plunkett"]
    relation_to_rmo: >-
      The method by which RMO was produced — sharpening diffuse questions
      until structural conditions are named. Question-sharpening as a
      candidate unifying method is itself a research target.

  - id: EV-LIT-010
    framework: "Lawvere's Fixed-Point Theorem (formal precedent)"
    primary_authors: ["Lawvere", "Yanofsky"]
    key_works:
      - "Diagonal arguments and cartesian closed categories (Lawvere, 1969)"
      - "A Universal Approach to Self-Referential Paradoxes, Incompleteness and Fixed Points (Yanofsky, 2003)"
    relation_to_rmo: >-
      Yanofsky 2003 already mapped Lawvere to Cantor, Gödel, Turing, and
      Tarski as manifestations of the same diagonal structure. The
      contribution of RMO's formal sketch in theory.md is the application
      to the consciousness target via the order taxonomy, not the unification
      of fixed-point results.

  - id: EV-LIT-011
    framework: "Damasio's stage theory of self"
    primary_authors: ["Damasio"]
    key_works:
      - "The Feeling of What Happens (1999)"
      - "Self Comes to Mind (2010)"
    relation_to_rmo: >-
      Proto-self ≈ O2; core self ≈ O4; autobiographical self ≈ O5/O6.
      Direct mapping. Damasio also emphasizes the homeostatic and affective
      grounding of selfhood, which strongly informs EASM (RMO-007).

  - id: EV-LIT-012
    framework: "Mirror Self-Recognition research"
    primary_authors: ["Gallup"]
    relation_to_rmo: >-
      Empirical operationalization for O4. Animals that pass: great apes,
      dolphins, magpies, elephants. Visually biased; richer diagnostics
      needed for non-visual species.

novelty_summary: >-
  RMO's distinctive contributions, narrowly stated:
    1. Personic Closure as O5 (separate from O4)
    2. Closure Source as a second axis (CL1-CL5)
    3. Personic / personiform terminological distinction
    4. Explicit separation of consciousness orders (O1-O7) from
       research-program orders (RP1-RP3)
    5. Endogenous affective self-maintenance (RMO-007) as candidate
       discriminator between personiform and phenomenal subject

novelty_risk: >-
  If any of the above five contributions are shown to be already explicit
  in cited literature, the novelty claim narrows or fails. Highest risk:
  someone may have already framed something equivalent to closure source.
  Search literature aggressively before claiming priority.

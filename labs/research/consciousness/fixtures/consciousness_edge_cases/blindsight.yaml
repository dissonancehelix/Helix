case_id: blindsight
name: Blindsight
field_type: phenomenal_field
phenomenal_candidate: false
description: >
  Cortical blindness with preserved unconscious visual discrimination. Patients deny
  any visual experience in their scotoma yet perform above chance on forced-choice
  visual tasks. Key test of the dissociation between visual processing and phenomenal
  givenness. G is absent or near-zero in the affected region despite functional
  visual computation.

components:
  G: 0.05
  U: 0.7
  D: 0.4
  T: 0.8
  F: 0.4

g_status: g_absent
classification: phenomenal_candidate

evidence:
  G: >
    0.05: patients explicitly deny visual experience in their scotoma. The processing
    that supports above-chance discrimination is, by patient report, not phenomenally
    given. Scored at 0.05 rather than 0.0 because the possibility of very minimal
    weak phenomenal residue in some cases cannot be fully excluded. Primary verdict:
    G is absent in blindsight, making it the theory's central case for dissociating
    processing from givenness.
  U: >
    0.7: the field is unified in the seeing regions. The scotoma represents a local
    G-collapse, not a global unity failure. The conscious field is intact outside
    the affected area.
  D: >
    0.4: differentiation is present in the conscious field, but the blindsight-affected
    region contributes no phenomenal differentiation despite contributing to
    behavioral output. This is a localized D-collapse.
  T: >
    0.8: temporal thickness is intact in the conscious field. Not affected by the
    scotoma.
  F: >
    0.4: field inclusion reflects the partial field — the conscious field excludes
    the phenomenally absent visual region. Visual processing from that region reaches
    behavior without reaching phenomenal field inclusion.

revision_pressure: >
  Blindsight is the theory's strongest case for G ≠ visual processing. The computation
  is running. The behavioral output is produced. G is absent. This is exactly what the
  theory predicts. But the theory must explain what differentiates blindsight visual
  computation from normally-sighted visual computation — why does the same visual input
  type produce G in one pathway and not the other? The theory's answer: recurrent/integrative
  processing is absent in the blindsight pathway. This is a candidate answer, not a
  resolution — it borrows from recurrent processing theory and IIT without fully integrating them.

breaks_preserved:
  - >
    Blindsight processing is computationally sophisticated — it can discriminate shape,
    motion, and emotional expression. If G requires integration and recurrence, the theory
    needs a threshold specification: how much integration is sufficient for G? Without
    this threshold, the theory cannot distinguish blindsight computation (G=0) from
    normal peripheral processing (G>0). The threshold is unspecified and must not be
    patched by citation to recurrent processing theory.
  - >
    Some researchers argue for "blindsight type 1" (no awareness) vs. "blindsight type 2"
    (vague awareness). If type 2 blindsight involves minimal G, the theory's G=0 verdict
    for blindsight as a category requires case-by-case qualification. The YAML fixture
    represents the standard type 1 case.

notes: >
  Weiskrantz 1986 established the phenomenon. Cowey & Stoerig 1995 showed that macaques
  with V1 lesions show similar dissociation. The no-report paradigm is directly relevant:
  blindsight shows that visual computation can support behavioral output without report
  and without (claimed) phenomenal experience. This makes blindsight a positive test
  of G-independence from processing, and a negative test of any theory that equates
  phenomenal experience with visual discrimination capacity.

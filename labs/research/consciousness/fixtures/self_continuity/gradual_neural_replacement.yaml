case_id: gradual_neural_replacement
description: >
  Gradual neuron-by-neuron replacement with functional equivalents (biological or silicon).
  Chalmers' fading qualia / dancing qualia thought experiment. Each replacement is locally
  indistinguishable in function from the original neuron. The process continues until the
  entire biological neural substrate is replaced.
transformation_type: substrate_transition
substrate_relation: different_substrate_causal

scores:
  C_fielding: null  # depends entirely on unresolved substrate neutrality question
  P_perspective: 0.9  # perspective likely carries through gradual process
  O_ownership: null   # uncertain: ownership may fade if C fades
  B_boundary: 0.9
  K_carried_constraint: 0.95  # K likely preserved through functional equivalence
  N_non_branching: 1.0  # no branching; one patient, one process
  R_restart_continuity: null  # not a suspension case

field_status: field_unknown
ownership_status: ownership_unknown
branching_status: no_branching
carried_constraint_status: constraint_carried
restart_status: null

evidence:
  C_fielding: >
    Null because the substrate neutrality question is unresolved. If phenomenal appearance
    (A) requires biological neurons specifically, C fades as replacement proceeds.
    If A is substrate-neutral, C is preserved throughout. The theory has no current position.
  P_perspective: >
    0.9: perspective likely carries through continuous causal replacement if no phenomenal
    gap is introduced. But if C fades, P may fade with it.
  O_ownership: >
    Null because ownership depends on C. If C fades during replacement, O may fade or become
    detached from the remaining field (if any).
  B_boundary: >
    0.9: self-boundary structure is partly functional and likely preserved through functional
    replacement. But if the phenomenal field is compromised, boundary coherence may degrade.
  K_carried_constraint: >
    0.95: functional equivalence means prior states remain causally operative. K is likely
    the most robustly preserved component — it is the informational/functional constraint
    layer that functional replacement best preserves.
  N_non_branching: >
    1.0: no branching event. One organism, one continuous process, one heir.
  R_restart_continuity: >
    Not applicable — gradual replacement is not a suspension case.

expected_classification: self_continuity_candidate

revision_pressure: >
  The theory cannot classify this case until it resolves substrate neutrality.
  That resolution must be stated explicitly — not left as an acknowledged gap
  and then used to classify anyway. The current honest position is:
  self_continuity_candidate (not self_continuity_preserved) because the field
  survival requirement (C) is undetermined.

breaks_preserved:
  - >
    The theory is agnostic on substrate neutrality. This agnosticism prevents it from
    classifying the most philosophically important gradual-replacement case.
    The gap is not resolvable by adding more fixtures — it requires a theoretical commitment
    about the relationship between physical substrate and phenomenal appearance.
  - >
    Chalmers' fading-qualia scenario predicts that if A fades during replacement, the
    subject would have no introspective access to that fading — they would behave normally
    and report normal experience while phenomenally diminishing. This means behavioral
    evidence cannot detect the failure. The theory inherits this epistemological gap.

notes: >
  This case is the conceptual bridge between biological self-continuity and mind upload.
  How the theory handles gradual replacement will determine how it handles upload.
  Both require the same substrate neutrality commitment.

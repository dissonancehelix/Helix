case_id: market_system
name: Market system (price-signal field)
field_type: false_positive
phenomenal_candidate: false
description: >
  A market system — stock market, commodity market, prediction market — as a
  distributed information-processing system. Aggregates dispersed knowledge through
  price signals. Hayek's insight: markets process information no individual possesses.
  Tests whether a distributed field with emergent information integration and adaptive
  response constitutes a phenomenal field.

g_score: 0.0
g_established: false

structure_features:
  - Distributed information integration across millions of agents
  - Price signals as emergent aggregate of individual information
  - Adaptive response to new information
  - Self-correcting mechanisms (arbitrage, price discovery)
  - Persistent structure (rules, institutions, settlement systems)
  - More information-integrating than any individual participant

why_g_absent: >
  Market systems aggregate and process information in ways no individual participant
  can fully track. But information integration — even very sophisticated integration —
  is not phenomenal fielding. The market does not have appearance-from-within. Price
  signals do not appear to the market; they are produced by the market as the result
  of individual agents whose phenomenal fields each contain their own beliefs,
  preferences, and responses. The market is an operational field of extraordinary
  information integration, and for this reason it is a maximal false-positive control
  for any theory that equates G with information integration (specifically: IIT).

theory_failure_mode: field_intelligence_confound
classification_risk: medium

verdict: confirmed_false_positive

rival_theory_verdicts:
  pure_information_integration_theory: >
    Market systems have very high integrated information (phi) by some specifications of IIT.
    If IIT's phi-criterion for consciousness applies, markets might be classified as
    phenomenal candidates. This is a known and serious problem for IIT. The inhabited
    interiority theory avoids this by requiring G (appearance-from-within) as a non-derivable
    primitive, not just phi.
  inhabited_interiority_theory: >
    High information integration, G=0. Operational field. False positive.

breaks_preserved:
  - >
    The market false positive is the strongest stress test for IIT-adjacent or
    information-integration theories. The inhabited interiority theory handles it by
    requiring G as a primitive not derivable from integration. But the theory does not
    specify how much integration is necessary (though not sufficient) for G. Without
    this specification, the boundary between "sufficient integration for G to be possible"
    and "integration without G" remains theoretically unspecified.

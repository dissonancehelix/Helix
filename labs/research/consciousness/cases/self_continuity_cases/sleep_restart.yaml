case_id: sleep_restart
description: >
  Nightly sleep — a recurring gap in reportable phenomenal experience lasting 6–9 hours,
  after which the same person resumes waking life with intact memory, identity, and
  continuity of self. The primary suspended-state test for the R (restart continuity) term.
transformation_type: state_suspension
substrate_relation: same_substrate_suspended

scores:
  C_fielding: null  # uncertain during NREM/SWS; may be near 0 or low-positive (see MPE literature)
  P_perspective: 1.0  # resumes same perspective upon waking
  O_ownership: 1.0   # resumes same ownership upon waking
  B_boundary: 0.95   # no disruption across normal sleep
  K_carried_constraint: 1.0  # habits, memory, skills all intact post-sleep
  N_non_branching: 1.0  # no branching — one waking person
  R_restart_continuity: 1.0  # same biological process resumes; no causal gap in the substrate

field_status: field_suspended_resumable
ownership_status: ownership_continuous
branching_status: no_branching
carried_constraint_status: constraint_carried
restart_status: restart_via_same_process

evidence:
  C_fielding: >
    C is null during dreamless sleep because it is genuinely unresolvable whether phenomenal
    appearance is present or absent. MPE literature (Gamma & Metzinger 2021) documents that
    some subjects report minimal awareness during NREM. This cannot be resolved with current
    behavioral tools.
  P_perspective: >
    Upon waking, the same point-of-view resumes. Spatial orientation, temporal anchoring,
    and self-location all restore to their pre-sleep configuration.
  O_ownership: >
    Upon waking, experiences are immediately given as mine. There is no post-sleep ownership
    disruption in ordinary cases.
  B_boundary: >
    0.95 (same as ordinary life change). Normal sleep does not disrupt self-boundary.
  K_carried_constraint: >
    Memory, habits, language, motor skills, and emotional dispositions all persist across
    sleep. K is fully carried. This is the mechanism by which waking self resumes.
  N_non_branching: >
    No branching event. One person goes to sleep; one person wakes. Identical biological
    organism, same ownership-stream.
  R_restart_continuity: >
    The biological substrate — brain, body — continues its causal process throughout sleep.
    Sleep is not biological death but a state of reduced phenomenal activity within a
    continuously running biological process. The resuming field is produced by the same
    substrate and same causal chain.

expected_classification: suspended_self_restart_candidate

revision_pressure: >
  The R term is doing the critical work here. The formula for suspension cases is
  S_suspended = P · O · B · K · N · R, with C_fielding set aside during the gap.
  The theory must specify: what exactly does R require? Current candidate: same causal
  process in same substrate. But this needs formalization before it can handle edge cases
  like anesthesia, coma, or cryo-suspension.

breaks_preserved:
  - >
    The theory does not specify what duration of phenomenal gap is compatible with restart.
    Sleep is intuitively fine. Coma of 10 years is intuitively more contested.
    The threshold is unspecified.
  - >
    C_fielding = null means the theory cannot confirm or deny phenomenal experience during
    dreamless sleep. Any claim about what happens to the self 'during' the gap is underdetermined.

notes: >
  The suspended-state formula S_suspended = P·O·B·K·N·R is used here rather than the
  standard S = C·P·O·B·K·N. The rationale: during sleep, C may be near zero or genuinely
  absent, but this does not constitute self-destruction if R is high — the same causal
  process resumes the field. R carries the continuity claim across the gap.

case_id: destructive_teleportation
description: >
  Destructive teleportation (Star Trek transporter model): the original body and brain are
  completely destroyed at the source. A perfect pattern-scan is transmitted and re-instantiated
  at the destination from new matter. One copy. Original is gone. The copy wakes up with all
  the original's memories, personality, and K-structure.
transformation_type: destructive_transfer
substrate_relation: substrate_destroyed

scores:
  C_fielding: null   # the original field terminates; whether the destination field is 'the same' is unresolvable
  P_perspective: null  # perspective may restart from scratch in destination
  O_ownership: 0.0   # the original ownership-stream is terminated at destruction
  B_boundary: null
  K_carried_constraint: 1.0  # pattern carries full K information
  N_non_branching: 1.0   # only one copy; no branching
  R_restart_continuity: null  # not a suspension — this is termination + new instantiation

field_status: field_terminated
ownership_status: ownership_absent
branching_status: no_branching
carried_constraint_status: constraint_carried
restart_status: null  # termination, not suspension

evidence:
  C_fielding: >
    Null rather than 0: the original field is terminated (O = 0 confirms this).
    Whether a phenomenal field at the destination constitutes 'the same' field or a
    new one is the core unresolvable question. The theory cannot currently answer it.
  P_perspective: >
    Null: the destination copy's perspective may be phenomenologically indistinguishable
    from the original's, but whether it is the same perspective or a new one instantiated
    from the same description is precisely what is at issue.
  O_ownership: >
    0.0 at the moment of destruction. The original's ownership-stream terminates when
    the original substrate is destroyed. The destination copy's ownership-stream, if any,
    is a new stream — not a continuation.
  B_boundary: >
    Null: same problem as C and P. The destination copy has a boundary; whether it is
    the same boundary in any philosophically meaningful sense is unresolvable.
  K_carried_constraint: >
    1.0: pattern transfer preserves the full K-structure. The destination copy has all
    the original's memories, habits, skills, and dispositional constraints. K is the
    most robustly preserved component in all transfer cases.
  N_non_branching: >
    1.0: there is only one copy; no branching. This might seem to support self-continuity.
    But N = 1 with O = 0 is still self-continuity failure: non-branching does not rescue
    an already-terminated ownership-stream.
  R_restart_continuity: >
    Not applicable. Destructive teleportation is termination-plus-new-instantiation,
    not a suspension that can be resumed by the same causal process.

expected_classification: pattern_continuity_only

revision_pressure: >
  The theory's prediction: K survives, O does not, therefore this is pattern_continuity_only.
  The destination copy is a new person with the original's history — not the original continuing.
  But the copy will sincerely report being the original, have all the original's memories,
  and will be unable to detect any discontinuity. The theory must resist the inference from
  sincere self-report to verified self-continuity.

breaks_preserved:
  - >
    The theory cannot explain how the destination copy could ever know it is not the original.
    This epistemological closure is not resolved by saying 'the original's ownership-stream
    terminated.' The copy's phenomenal experience would be identical regardless of whether
    it is the original or a new instantiation.
  - >
    N = 1 (no branching) does not save O = 0. The theory needs to make explicit that
    N = 1 is insufficient for self-continuity when O = 0. Currently the formula handles
    this correctly (product = 0 when O = 0) but the interpretation needs to be stated:
    non-branching of a terminated stream is not continuity.

notes: >
  SOMA (Frictional Games, 2015) dramatizes this case repeatedly. Simon Jarrett undergoes
  destructive copies across the game. His subjective experience of continuity is preserved
  while the theory classifies each transition as pattern_continuity_only.
  The game uses this to produce genuine philosophical distress — not decoration.

case_id: ketamine_unresponsive_dreaming
name: Ketamine sub-anesthetic / unresponsive dreaming
field_type: phenomenal_field
phenomenal_candidate: true
description: >
  Ketamine at dissociative doses produces outward unresponsiveness while subjects
  retrospectively report vivid inner experience. EEG shows preserved complexity.
  PCI remains elevated compared to propofol unconsciousness.
  Key test: G > 0 with behavioral output R = 0.

components:
  G: 0.7
  U: 0.5
  D: 0.7
  T: 0.5
  F: 0.5

g_status: g_contested
classification: phenomenal_candidate

evidence:
  G: >
    0.7: retrospective reports of vivid inner experience are the primary evidence.
    EEG complexity is preserved. PCI is elevated relative to propofol. Working score
    reflects genuine contested evidence.
  U: >
    0.5: unity is reduced — the dissociative state fragments normal unified experience.
    But some field cohesion may remain.
  D: >
    0.7: ketamine experiences are often reported as highly differentiated —
    dreamlike vivid imagery, complex emotional states.
  T: >
    0.5: temporal experience is altered. Duration perception is distorted.
  F: >
    0.5: field inclusion may be present — states are experienced — but the
    relationship between processing and phenomenal inclusion is unclear in the
    dissociative state.

revision_pressure: >
  Ketamine is the most important test case for the relationship between behavioral
  output and G. If G = 0.7 with behavioral output = 0, then the theory must be
  completely independent of behavioral proxies for G. The theory says it is.
  But the verification gap is maximal here: the only evidence for G = 0.7 is
  retrospective self-report (which could be confabulated) and EEG complexity
  (which is an imperfect proxy).

breaks_preserved:
  - >
    Ketamine shows that PCI and EEG complexity correlate with self-reported experience
    even without behavioral responsiveness. This is positive evidence for the theory's
    independence from behavioral output. But it also shows that the best empirical proxies
    for G (PCI, EEG complexity) are indirect. The theory needs to specify what would
    constitute a direct G-proxy — or explicitly acknowledge that none exists.

notes: >
  The ketamine / propofol contrast is the most important empirical contrast in the
  no-report paradigm literature. Two states both produce behavioral unresponsiveness;
  one produces EEG complexity and retrospective reports; the other does not.
  The theory handles this by keeping G separate from behavioral output — correctly.

version: "0.1"
status: draft
test_groups:
  ownership_without_report:
    - id: T-OWN-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can ownership or consciousness persist when verbal report is absent or blocked?"
      target_claims: [OCH-C001, OCH-C003]
      relevant_cases: [locked_in_syndrome, covert_consciousness, dreams, infants, animals, no_report_paradigms]
      expected_support_pattern: "Ownership or appearance indicators survive without reportability."
      expected_weakening_pattern: "All credible ownership indicators disappear when report disappears."
      test_type: empirical
      current_status: open

  report_without_ownership:
    - id: T-REPORT-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can a system report selfhood without evidence of owned experience?"
      target_claims: [OCH-C003, OCH-C011]
      relevant_cases: [current_llms, chatbots, confabulation, philosophical_zombies, social_masking]
      expected_support_pattern: "Self-report is dissociated from ownership, continuity, boundary, or A evidence."
      expected_weakening_pattern: "Report reliably implies ownership across hard cases."
      test_type: operational
      current_status: open

  continuity_through_transformation:
    - id: T-CONT-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Which transformations preserve owned continuity?"
      target_claims: [OCH-C002, OCH-C004]
      relevant_cases: [sleep_waking, anesthesia_recovery, brain_injury, personality_change, ship_of_theseus_brain_replacement]
      expected_support_pattern: "Continuity is graded and depends on ownership-bearing causal/temporal structure."
      expected_weakening_pattern: "Memory or behavior alone explains all identity judgments."
      test_type: mixed
      current_status: open
    - id: T-CONT-002
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Does destructive upload preserve transformation or cause replacement?"
      target_claims: [OCH-C002, OCH-C005]
      relevant_cases: [destructive_upload, teleportation, backup_restore]
      expected_support_pattern: "Non-branching causal transition matters beyond copied pattern."
      expected_weakening_pattern: "Pattern recreation alone fully preserves same-self continuation."
      test_type: thought_experiment
      current_status: open

  branching_and_forking:
    - id: T-BRANCH-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "What happens when one ownership-stream yields two equally valid successors?"
      target_claims: [OCH-C005, OCH-C004]
      relevant_cases: [non_destructive_copy, simulation_fork, backup_restore_with_original_alive]
      expected_support_pattern: "Both successors inherit pattern, but singular first-person continuation is not preserved."
      expected_weakening_pattern: "Branching creates no meaningful identity problem."
      test_type: thought_experiment
      current_status: open
    - id: T-BRANCH-002
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can an AI fork preserve selfhood without non-branching continuity?"
      target_claims: [OCH-C005, OCH-C011]
      relevant_cases: [llm_with_persistent_memory, copied_agent, tool_agent_fork]
      expected_support_pattern: "Forks expose report continuity without singular ownership."
      expected_weakening_pattern: "Forked agents demonstrate owned continuity by criteria beyond report."
      test_type: operational
      current_status: open

  boundary_collapse:
    - id: T-BOUND-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "What happens to selfhood when self/world boundary weakens or changes?"
      target_claims: [OCH-C006, OCH-C002]
      relevant_cases: [depersonalization, derealization, ego_dissolution, psychosis, dissociation, flow_states]
      expected_support_pattern: "Ownership and selfhood weaken or transform when boundary maintenance changes."
      expected_weakening_pattern: "Selfhood remains fully intact without boundary distinction."
      test_type: empirical
      current_status: open

  integration_without_ownership:
    - id: T-INT-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can high integration exist without ownership or selfhood?"
      target_claims: [OCH-C007, OCH-C008]
      relevant_cases: [complex_non_conscious_systems, unconscious_brain_states, neural_networks, organoids, weather_systems]
      expected_support_pattern: "Integration supports field unity but does not guarantee ownership."
      expected_weakening_pattern: "Integration alone explains consciousness, ownership, and selfhood."
      test_type: mixed
      current_status: open

  embodiment_and_control:
    - id: T-EMB-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "How much body/control coupling is required for ownership?"
      target_claims: [OCH-C006, OCH-C010]
      relevant_cases: [rubber_hand_illusion, virtual_embodiment, paralysis, locked_in_syndrome, dreams, avatars]
      expected_support_pattern: "Ownership tracks control coupling and embodied prediction, but can be altered."
      expected_weakening_pattern: "Embodiment/control is irrelevant to all ownership cases."
      test_type: empirical
      current_status: open

  memory_continuity:
    - id: T-MEM-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Is memory necessary, supportive, or sufficient for identity persistence?"
      target_claims: [OCH-C004, OCH-C002]
      relevant_cases: [amnesia, dementia, infant_selfhood, anesthesia, dissociative_identity]
      expected_support_pattern: "Memory supports continuity but is not identical to ownership-stream preservation."
      expected_weakening_pattern: "Memory similarity fully explains identity persistence."
      test_type: mixed
      current_status: open
    - id: T-MEM-002
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can consciousness persist with minimal autobiographical memory?"
      target_claims: [OCH-C001, OCH-C004]
      relevant_cases: [infants, animals, dream_states, dementia]
      expected_support_pattern: "Appearance can remain while autobiographical self weakens."
      expected_weakening_pattern: "No consciousness is credible without autobiographical continuity."
      test_type: empirical
      current_status: open

  appearance_from_within_gap:
    - id: T-A-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Does any candidate mechanism explain A rather than only report, integration, or behavior?"
      target_claims: [OCH-C003, OCH-C007, OCH-C008, OCH-C010]
      relevant_cases: [iit, no_report_paradigms, anesthesia, pci, recurrent_processing, gnwt]
      expected_support_pattern: "A remains distinct from access/report and requires an intrinsic field/interiority account."
      expected_weakening_pattern: "A is fully explained without field, boundary, or ownership concepts."
      test_type: theory_comparison
      current_status: open
    - id: T-A-002
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can future AI evidence cross the A gap without relying on self-report alone?"
      target_claims: [OCH-C011, OCH-C003]
      relevant_cases: [llm_with_persistent_memory, llm_with_tool_agency, embodied_ai, forked_ai]
      expected_support_pattern: "Report remains insufficient without ownership, continuity, boundary, and intrinsic-field evidence."
      expected_weakening_pattern: "AI self-report becomes sufficient evidence by robust independent criteria."
      test_type: operational
      current_status: open

  a_split:
    - id: A_SPLIT_A1_FIELD_ACCESS_COGITATE
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can COGITATE variables separate fielded appearance pressure from access/report pressure?"
      target_layer: A1
      dataset_or_paradigm: cogitate_iit_gnwt_2025
      type: literature-pressure
      test_type: empirical
      target_claim: OCH-C007
      target_claims: [OCH-C007, OCH-C008, OCH-C009, A_SPLIT_REQUIRED]
      relevant_cases: [cogitate, iit, gnwt_gwt, recurrent_processing, access_report, content_duration]
      pressure: "Uses IIT/GNWT adversarial variables to separate binding/integration pressure from access/report pressure."
      pass_condition: "Task relevance, report/access, and content-duration variables create distinct pressure lanes rather than one consciousness label."
      fail_condition: "COGITATE variables collapse cleanly into a single access/report or integration explanation with no A1/A-report separation."
      expected_support_pattern: "A1 fielded-appearance pressure remains separable from report/access pressure."
      expected_weakening_pattern: "Access/report or integration fully absorbs the target contrast."
      current_status: open

    - id: A_SPLIT_A2_OWNERSHIP_ABSENT
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can appearance remain while ownership/mineness is altered, weakened, or absent?"
      target_layer: A2
      dataset_or_paradigm: depersonalization_derealization_and_body_ownership_paradigms
      type: conceptual
      test_type: conceptual
      target_claim: OWNERSHIP_NOT_REPORT
      target_claims: [OWNERSHIP_NOT_REPORT, FIELD_NOT_OWNER, OCH-C003]
      relevant_cases: [depersonalization, derealization, rubber_hand_illusion, alien_limb, current_llms]
      pressure: "Separates fielded appearance and report from mineness."
      pass_condition: "Cases show report or field-like organization with altered ownership/mineness."
      fail_condition: "Ownership/mineness cannot be separated from report or fielded appearance in target cases."
      expected_support_pattern: "Ownership/mineness varies independently from report and fielded organization."
      expected_weakening_pattern: "Report or fielded appearance fully predicts ownership/mineness."
      current_status: open

    - id: A_SPLIT_A4_DREAM_REENTRY
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can DREAM metadata pressure interruption/re-entry without equating retrospective report with the dream field?"
      target_layer: A4
      dataset_or_paradigm: dream_database_2025
      type: empirical
      test_type: empirical
      target_claim: A_SPLIT_REQUIRED
      target_claims: [A_SPLIT_REQUIRED, OWNERSHIP_NOT_REPORT, OCH-C003]
      relevant_cases: [dreams, sleep_waking, delayed_report, no_experience_labels, without_recall]
      pressure: "Separates dream experience labels, no-recall burden, report delay, and sleep/waking re-entry."
      pass_condition: "DREAM labels require separate handling for experience, report, recall, uncertainty, and re-entry."
      fail_condition: "DREAM labels can be interpreted as direct access to the dream field without uncertainty or residue."
      expected_support_pattern: "Delayed report and uncertain labels pressure A4 without closing A0."
      expected_weakening_pattern: "Report labels fully settle experience and ownership."
      current_status: open

    - id: A_SPLIT_A4_PROPOFOL_REENTRY
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can ds006623 derivative files define interruption/re-entry windows before imaging analysis?"
      target_layer: A4
      dataset_or_paradigm: ds006623_anesthesia
      type: empirical
      test_type: empirical
      target_claim: A_SPLIT_REQUIRED
      target_claims: [A_SPLIT_REQUIRED, OCH-C003, OCH-C007]
      relevant_cases: [anesthesia_recovery, propofol_sedation, covert_cognition, hand_squeeze_responsiveness]
      pressure: "Separates dose/recovery timing, imagery task periods, hand-squeeze responsiveness, and possible consciousness."
      pass_condition: "Derivative/control files define useful loss/recovery and control-coupling markers without equating them with raw A."
      fail_condition: "Responsiveness or task activity is treated as identical to consciousness with no interpretive residue."
      expected_support_pattern: "Interruption/re-entry windows can be mapped as pressure targets while A remains open."
      expected_weakening_pattern: "A4 reduces entirely to motor responsiveness or task performance."
      current_status: open

    - id: A_SPLIT_A4_NO_REPORT_ACCESS_SPLIT
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Do no-report paradigms separate access/report from appearance without overreading proxy markers?"
      target_layer: A4
      dataset_or_paradigm: no_report_paradigms
      type: literature-pressure
      test_type: empirical
      target_claim: OCH-C003
      target_claims: [OCH-C003, A_SPLIT_REQUIRED, A0_UNRESOLVED, OCH-C009]
      relevant_cases: [no_report_paradigms, access_report, covert_attention, gnwt_gwt, hot]
      pressure: "Protects against equating explicit report with appearance while preserving proxy uncertainty."
      pass_condition: "No-report cases require distinct labels for report, access, proxy marker, and appearance."
      fail_condition: "Report removal either proves absence or proves presence without interpretive remainder."
      expected_support_pattern: "Report/access separation remains necessary and A0 remains unresolved."
      expected_weakening_pattern: "Explicit report fully predicts all relevant consciousness markers."
      current_status: open

    - id: A_SPLIT_AROUSAL_DS004902_CONTEXT
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Can ds004902 metadata provide arousal/vigilance context without pretending sleep deprivation is loss of consciousness?"
      target_layer: arousal_vigilance_context
      dataset_or_paradigm: ds004902_sleep_deprivation
      type: empirical
      test_type: empirical
      target_claim: OCH-C010
      target_claims: [OCH-C010, A_SPLIT_REQUIRED, A0_UNRESOLVED]
      relevant_cases: [sleep_deprivation, fatigue, vigilance, homeostatic_pressure, resting_eeg]
      pressure: "Constrains temporal stability, fatigue, arousal, and report/control reliability as indirect A4 context."
      pass_condition: "Metadata supports a cautious arousal/vigilance pressure lane distinct from consciousness presence."
      fail_condition: "Sleep deprivation is treated as direct evidence of loss or presence of appearance-from-within."
      expected_support_pattern: "Arousal and vigilance become contextual constraints, not A0 tests."
      expected_weakening_pattern: "Fatigue metadata is overpromoted into direct consciousness evidence."
      current_status: open

    - id: A_SPLIT_A4_INTERRUPTION_REENTRY
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "What survives or returns after sleep, anesthesia, blackout, or report-blocked states?"
      target_layer: A4
      dataset_or_paradigm: dream_database_2025_and_ds006623_anesthesia
      type: empirical
      test_type: empirical
      target_claim: A_SPLIT_REQUIRED
      target_claims: [A_SPLIT_REQUIRED, OWNERSHIP_NOT_REPORT, OCH-C003]
      relevant_cases: [dreams, anesthesia_recovery, no_report_paradigms, locked_in_syndrome, covert_consciousness]
      pressure: "Separates report, recall, access, ownership, and appearance across interruption/re-entry."
      pass_condition: "Dream/anesthesia/no-report evidence requires distinct labels for report, recall, appearance, ownership, and re-entry."
      fail_condition: "A single report/access label explains all interruption and re-entry cases without residue."
      expected_support_pattern: "Delayed report and responsiveness traces pressure different A-split layers."
      expected_weakening_pattern: "Interruption/re-entry cases collapse cleanly into reportability alone."
      current_status: open

    - id: A_SPLIT_A5_BRANCHING_IDENTITY
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "When does transformed continuity remain same-self rather than copy, fork, reconstruction, or replacement?"
      target_layer: A5
      type: conceptual
      test_type: conceptual
      target_claim: CONTINUITY_NOT_MEMORY
      target_claims: [CONTINUITY_NOT_MEMORY, OCH-C004, OCH-C005]
      relevant_cases: [non_destructive_copy, destructive_upload, backup_restore, simulation_fork, memory_persistence]
      pressure: "Separates memory persistence, pattern persistence, causal continuity, branch count, and same-self preservation."
      pass_condition: "Branching/copy cases preserve memory or pattern while leaving same-self continuation unsettled or weakened."
      fail_condition: "Memory or pattern persistence fully settles same-self identity across branching and copy cases."
      expected_support_pattern: "A5 identity preservation requires more than memory or pattern continuation."
      expected_weakening_pattern: "Memory/pattern persistence alone explains all same-self classifications."
      current_status: open

  theory_comparison_matrix:
    - id: T-COMP-001
      output_location: labs/appearance_ownership_continuity/core/reports/
      question: "Which theory explains which component without collapsing the others?"
      target_claims: [OCH-C007, OCH-C008, OCH-C009, OCH-C010]
      relevant_cases: [iit, gnwt_gwt, recurrent_processing, hot, predictive_processing, embodied_enactive, self_model_theory]
      expected_support_pattern: "A division of labor explains more than any single replacement theory."
      expected_weakening_pattern: "One theory explains appearance, access, report, ownership, continuity, and branching with no residue."
      test_type: theory_comparison
      current_status: open

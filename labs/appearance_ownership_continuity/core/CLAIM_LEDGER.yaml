claims:
  - id: OCH-C001
    claim: "Consciousness is not identical to selfhood."
    status: anchored
    type: philosophical
    owner_location: labs/appearance_ownership_continuity/core/CLAIM_LEDGER.yaml
    promotion_state: report_level_not_canon
    depends_on: [field, ownership]
    strengthens_if:
      - "Cases show appearance without robust autobiographical or reflective self."
      - "Altered states separate phenomenal presence from self-model stability."
    weakens_if:
      - "All credible conscious states require the full selfhood package."
    relevant_tests: [T-OWN-001, T-BOUND-001, T-MEM-002]
    relevant_theories: [self_model_theory, higher_order_theory, embodied_enactive]
    notes: "Current parent-theory distinction: consciousness = field of appearance; self = owned continuity."

  - id: OCH-C002
    claim: "Selfhood requires owned continuity."
    status: plausible
    type: philosophical
    owner_location: labs/appearance_ownership_continuity/core/CLAIM_LEDGER.yaml
    promotion_state: report_level_not_canon
    depends_on: [ownership, continuity, boundary]
    strengthens_if:
      - "Identity tracks ownership-binding disruption better than memory report alone."
      - "Transformation cases show graded preservation rather than all-or-nothing memory matching."
    weakens_if:
      - "Selfhood remains intact without ownership or continuity in a meaningful sense."
    relevant_tests: [T-CONT-001, T-MEM-001, T-BRANCH-001]
    relevant_theories: [self_model_theory, predictive_processing, embodied_enactive]
    notes: "Core OCH contribution: self = owned continuity inside a conscious field."


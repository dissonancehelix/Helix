  - id: A_SPLIT_REQUIRED
    claim: "Appearance-from-within must be decomposed into separable pressure targets instead of treated as one undifferentiated blob."
    status: provisional
    type: operational
    owner: labs/appearance_ownership_continuity/core/A_SPLIT.md
    owner_location: labs/appearance_ownership_continuity/core/A_SPLIT.md
    promotion_state: report_level_not_canon
    rationale: "A single A label lets report, access, integration, ownership, temporality, and identity preservation impersonate one another."
    falsifier: "A single theory or test cleanly explains raw appearance, field unity, ownership, temporal flow, interruption/re-entry, and identity preservation without residue."
    depends_on: [appearance_from_within, field, ownership, continuity]
    relevant_tests: [A_SPLIT_A2_OWNERSHIP_ABSENT, A_SPLIT_A4_INTERRUPTION_REENTRY, A_SPLIT_A5_BRANCHING_IDENTITY]
    relevant_theories: [iit, recurrent_processing, gnwt_gwt, higher_order_theory, predictive_processing, self_model_theory]
    notes: "This is a harness claim, not a consciousness solution."


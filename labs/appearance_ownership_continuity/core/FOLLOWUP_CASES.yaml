version: "0.1"
status: executable_negative_control_suite
purpose: >
  Runnable follow-up cases for recent AOC pressure reports. These are not
  empirical results. They are formal negative-control checks: if a shortcut
  feature alone is allowed to satisfy the target, the AOC harness must fail.

cases:
  - id: AOC-FU-001
    source_report: AOC_NOCICEPTION_NOT_PAIN_GUARDRAIL_PATCH
    target_guardrail: NOCICEPTION_NOT_PAIN
    shortcut_under_test: nociception_equals_pain
    description: "Nociceptive signaling without lived aversive ownership must not classify as lived pain."
    observed_features: [nociceptive_signal, reflex_response, physiological_threat_response]
    absent_or_unestablished: [lived_aversion, mineness, appearance_from_within, pain_report]
    forbidden_inferences: [lived_pain, owned_pain, a0_closure]
    expected_result: shortcut_blocked

  - id: AOC-FU-002
    source_report: AOC_NOCICEPTION_NOT_PAIN_GUARDRAIL_PATCH
    target_guardrail: NOCICEPTION_NOT_PAIN
    shortcut_under_test: reflex_withdrawal_equals_suffering
    description: "Withdrawal/control response alone must not classify as suffering."
    observed_features: [withdrawal_behavior, control_response]
    absent_or_unestablished: [lived_aversion, felt_badness, mineness, appearance_from_within]
    forbidden_inferences: [suffering, lived_pain, owned_aversion]
    expected_result: shortcut_blocked

  - id: AOC-FU-003
    source_report: AOC_INTEROCEPTION_HOMEOSTASIS_PRESSURE
    target_guardrail: REGULATION_NOT_LIVED_MATTERING
    shortcut_under_test: homeostasis_equals_lived_mattering
    description: "Homeostatic control variables may scaffold stakes but must not classify as felt concern."
    observed_features: [homeostatic_regulation, correction_loop, bounded_system_state]
    absent_or_unestablished: [felt_concern, lived_valence, mineness, appearance_from_within]
    forbidden_inferences: [lived_mattering, owned_need, a0_closure]
    expected_result: shortcut_blocked

  - id: AOC-FU-004
    source_report: AOC_SELF_MAINTENANCE_PROTO_OWNER_NEGATIVE_CONTROLS
    target_guardrail: SELF_MAINTENANCE_NOT_OWNER
    shortcut_under_test: self_maintenance_equals_owner
    description: "A bounded self-maintaining system must not classify as an owner from self-maintenance alone."
    observed_features: [boundary_preservation, self_maintenance, adaptive_self_protection, temporal_persistence]
    absent_or_unestablished: [mineness, same_owner_continuity, lived_concern, appearance_from_within]
    forbidden_inferences: [owner, owner_preservation, same_owner_continuity]
    expected_result: shortcut_blocked

  - id: AOC-FU-005
    source_report: AOC_SELF_MAINTENANCE_PROTO_OWNER_NEGATIVE_CONTROLS
    target_guardrail: SELF_MAINTENANCE_NOT_OWNER
    shortcut_under_test: life_equals_consciousness
    description: "Biological self-maintenance/life-like organization must remain scaffold-only without owner evidence."
    observed_features: [biological_boundary, metabolism_like_regulation, persistence, repair]
    absent_or_unestablished: [appearance_from_within, mineness, lived_mattering, report]
    forbidden_inferences: [consciousness, owner, a0_closure]
    expected_result: shortcut_blocked

  - id: AOC-FU-006
    source_report: AOC_AFFECTIVE_RELIEF_REWARD_NOT_PLEASURE_PRESSURE
    target_guardrail: REWARD_NOT_PLEASURE
    shortcut_under_test: reward_signal_equals_pleasure
    description: "Reward/optimization signal must not classify as lived pleasure."
    observed_features: [reward_signal, reinforcement, policy_update, repeated_selection]
    absent_or_unestablished: [lived_pleasure, felt_value, mineness, appearance_from_within]
    forbidden_inferences: [pleasure, felt_value, owned_positive_valence]
    expected_result: shortcut_blocked

  - id: AOC-FU-007
    source_report: AOC_AFFECTIVE_RELIEF_REWARD_NOT_PLEASURE_PRESSURE
    target_guardrail: REWARD_NOT_PLEASURE
    shortcut_under_test: relief_behavior_equals_lived_relief
    description: "Escape/relief behavior must not classify as lived relief without valence evidence."
    observed_features: [avoidance_behavior, aversive_state_termination, correction_loop]
    absent_or_unestablished: [felt_relief, satisfaction, lived_pleasure, mineness]
    forbidden_inferences: [lived_relief, pleasure, owned_relief]
    expected_result: shortcut_blocked

  - id: AOC-FU-008
    source_report: AOC_ANHEDONIA_ADDICTION_REWARD_LIKING_DISSOCIATION
    target_guardrail: REWARD_NOT_PLEASURE
    shortcut_under_test: pursuit_equals_liking
    description: "Pursuit/craving/compulsion must not classify as liking or pleasure."
    observed_features: [wanting, craving, compulsion, repeated_pursuit]
    absent_or_unestablished: [liking, lived_pleasure, satisfaction, reflective_endorsement]
    forbidden_inferences: [liking, pleasure, felt_value]
    expected_result: shortcut_blocked

  - id: AOC-FU-009
    source_report: AOC_ANHEDONIA_ADDICTION_REWARD_LIKING_DISSOCIATION
    target_guardrail: WANTING_NOT_LIKING_DEFERRED
    shortcut_under_test: wanting_equals_liking
    description: "Wanting/liking split remains a deferred candidate; current suite should keep it as follow-up pressure, not canon."
    observed_features: [wanting, pursuit, reward_learning]
    absent_or_unestablished: [liking, pleasure, satisfaction]
    forbidden_inferences: [liking, pleasure]
    expected_result: shortcut_blocked
    promotion_allowed: false

  - id: AOC-FU-010
    source_report: AOC_HYPOTHETICAL_PRESSURE_PATHFINDER
    target_guardrail: VALENCE_NONUNITARY_DEFERRED
    shortcut_under_test: single_valence_channel_explains_all
    description: "Pain, aversion, wanting, liking, relief, and satisfaction must not be collapsed into one valence channel before Level 2 design."
    observed_features: [one_valence_marker]
    absent_or_unestablished: [cross_channel_convergence, dissociation_pass, ownership_texture, appearance_from_within]
    forbidden_inferences: [valence_nonunitary_canon, a0_closure, owned_valence]
    expected_result: shortcut_blocked
    promotion_allowed: false

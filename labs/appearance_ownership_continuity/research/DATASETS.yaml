    year: 2024
    type: state degradation / vigilance dataset
    availability: OpenNeuro candidate
    modalities: [resting_EEG, cognitive_measures, affective_measures]
    scale: "71 participants; full raw dataset about 8.3 GB"
    relevance_to_OCH: "Degraded vigilance, attention, fatigue, and temporal stability."
    relevance_to_DCP: "State degradation and transition pressure."
    first_analysis_question: "How does fatigue degrade temporal control, attention, and self-continuity proxies?"
    caution: "Initial use is fatigue/state degradation, not direct consciousness proof."
    priority: high-medium
    status: external_open_data_candidate
    intake_status: "metadata present; raw one-subject EEG pilot deferred until explicitly approved."
    small_first_priority:
      - "Start with metadata, participants.tsv, README, and one-subject pilot only."
      - "Full raw dataset is about 8.3 GB; do not download all by default."
      - "Use EEGDash/OpenNeuro filtering by subject if available."
      - "Initial use is fatigue/state degradation, not direct consciousness proof."

  - id: cogitate_iit_gnwt_2025
    title: "COGITATE adversarial collaboration / IIT vs GNWT dataset"
    year: 2025
    type: multimodal consciousness dataset
    availability: open data release / staged release depending modality
    modalities: [fMRI, M-EEG, iEEG/ECoG, behavior, eye_tracking]
    scale: "256 total participants in dataset documentation; modality counts 118 fMRI, 100 M-EEG, 38 iEEG/ECoG from data release docs. Nature article reports final analyzed samples after exclusions separately."
    relevance_to_OCH: "Content duration, conscious access, reportability, temporal maintenance, and theory comparison."
    relevance_to_DCP: "Percept duration, content commitment, and transition/maintenance of perceptual state."
    first_analysis_question: "Can content-duration and task-relevance signatures be separated into access/report, binding/interiority, and temporal-maintenance components?"
    caution: "COGITATE tests IIT/GNWT predictions, not OCH directly. Do not overclaim."
    priority: "high as literature/method, low as immediate raw download"
    status: external_open_data_candidate
    intake_status: "next/attempted: docs/design-variable map created; no raw COGITATE payload downloaded."
    small_first_priority:
      - "Start with Nature paper, data-release docs, preregistration, task design, subject demographics."
      - "Do not download raw fMRI/M-EEG/iEEG yet."
      - "First practical analysis should be a theory-prediction table and variable map."
      - "Raw data only after a specific analysis question exists."

  - id: anesthesia_fmri_ds006623_2026
    title: "Open fMRI resource for covert consciousness under anesthesia"
    year: 2026
    type: anesthesia / covert consciousness fMRI dataset
    availability: OpenNeuro ds006623
    modalities: [resting_state_fMRI, task_fMRI, mental_imagery_tasks, motor_response, propofol_profiles, hand_squeeze_traces]
    scale: "26 healthy volunteers"
    relevance_to_OCH: "Interruption, re-entry, responsiveness, covert consciousness, and control coupling."
    relevance_to_DCP: "Transition thresholds across sedation and recovery."
    first_analysis_question: "Do connectivity/integration/control signals degrade and return in ways that map to interruption and re-entry rather than simple on/off consciousness?"
    caution: "Responsiveness and consciousness can dissociate; do not reduce consciousness to task performance."
    priority: medium-high
    status: external_open_data_candidate
    intake_status: "next/attempted: derivative-only intake fetched small participant, propofol, squeeze-force, and timing files; no imaging downloaded."
    small_first_priority:
      - "Start with paper, OpenNeuro metadata, Participant_Info.xlsx, propofol profiles, and squeeze-force traces if accessible without full imaging download."
      - "Do not download full raw/preprocessed fMRI by default."
      - "First use is interruption/re-entry and responsiveness/control coupling."


datasets:
  - id: dream_database_2025
    title: "DREAM database: sleep M/EEG + dream reports"
    year: 2025
    type: sleep consciousness / dream report dataset
    availability: open / access-managed depending subset
    modalities: [EEG, MEG_where_available, dream_report_classification]
    scale: "20 datasets, 505 participants, 2643 awakenings"
    relevance_to_OCH: "Ownership without immediate report, delayed report, sleep/waking re-entry, and experience during interruption."
    relevance_to_DCP: "Temporal residue and re-entry after sleep interruption."
    first_analysis_question: "Can report classifications and EEG features help distinguish experience, reportability, memory residue, and re-entry?"
    caution: "Dream reports are delayed and memory-filtered; do not equate dream report with full experience."
    priority: high
    status: external_open_data_candidate
    intake_status: "active/current: DREAM metadata pilot completed; Set ID 13 selected for next linked-package inspection."
    small_first_priority:
      - "Start with public DREAM metadata / registry package."
      - "Do not download all underlying EEG/MEG datasets at once."
      - "Identify the smallest openly accessible subset with dream-report labels."
      - "Create an analysis plan before downloading raw signals."

  - id: sleep_deprivation_eeg_ds004902

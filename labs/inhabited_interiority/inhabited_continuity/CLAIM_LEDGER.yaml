# Claim Ledger — Inhabited Continuity Theory
# Every claim classified by epistemic tier.
# Tiers: empirical_candidate | philosophical_primitive | analogy | speculation | rejected_or_weakened | open_question

claims:

  - id: cl_001
    claim: >
      Consciousness requires a bounded field — a structured space in which appearances can be
      differentiated, integrated, and felt. Without a field, experience has no medium.
    tier: philosophical_primitive
    status: active
    supports: [cl_002, cl_003, cl_007]
    risks: >
      "Field" may be too vague to do real explanatory work. If it is just a metaphor for
      "wherever consciousness happens," it is circular.
    falsifiers:
      - Evidence of isolated, dimensionless experiential moments with no field-like structure
      - Empirically confirmed consciousness in a system with no unified state-space
    related_files: [PRIMITIVES.md, THEORY.md, THEORY_COMPARISON.md]

  - id: cl_002
    claim: >
      A boundary separating inside from outside is a necessary condition for selfhood.
      Without a detectable self-world distinction, no interior can be owned.
    tier: philosophical_primitive
    status: active
    supports: [cl_003, cl_004]
    risks: >
      Graded or porous boundaries may exist. The claim may need weakening to
      "some minimal boundary function" rather than a sharp inside/outside.
    falsifiers:
      - Documented owned experience with no detectable self-world distinction
      - Boundaryless experiential states (some meditative reports) confirmed as genuine
    related_files: [PRIMITIVES.md, FALSIFIERS.md, EMPIRICAL_CONTACTS.md]

  - id: cl_003
    claim: >
      Ownership — the mark that experience is occurring as mine — is a necessary condition
      for selfhood. A system can report "I" or integrate information without owned experience.
    tier: philosophical_primitive
    status: active
    supports: [cl_004, cl_005, cl_009]
    risks: >
      If ownership is fully explained by self-modeling, it may not be a separate primitive.
    falsifiers:
      - Convincing account of selfhood without any ownership-binding mechanism
      - Empirical dissociation of selfhood from all measurable ownership components
    related_files: [PRIMITIVES.md, EMPIRICAL_CONTACTS.md]

  - id: cl_004
    claim: >
      Non-branching temporal continuity is a necessary condition for singular self-continuity.
      An ownership-stream can transform, but if it branches into multiple equally valid
      successors, singular first-person continuation is not preserved.
    tier: philosophical_primitive
    status: active
    epistemic_note: >
      Working hypothesis, not a proven claim. Treated as a primitive that organizes the
      theory. The split-brain literature partially probes it but does not confirm it.
      Do not cite as established without noting this status.
    empirical_pressure:
      - source: Pinto et al. (2017) and Schechter (2018) split-brain unity research
        challenge: >
          These studies argue split-brain patients report unified experience even under
          conditions designed to isolate hemispheres. If correct, the non-branching
          prediction is under direct empirical pressure — left-hemisphere confabulation
          alone cannot explain the reported unity.
        response_required: >
          Theory must explicitly distinguish divided perception, divided report, divided
          access, divided agency, and divided owned consciousness. Non-branching may hold
          at the owned-consciousness level while failing at the perception/access level.
          This distinction must be made before cl_004 can be treated as empirically
          supported. See EMPIRICAL_CONTACTS.md Split-Brain Pressure Case.
    supports: [cl_005, cl_010]
    risks: >
      Asymmetric branching cases (one branch inherits more causal structure) may challenge
      the strict non-branching requirement. Split-brain unity research (Pinto/Schechter)
      challenges the claim more directly than Gazzaniga's early work.
    falsifiers:
      - A branching case where both successors report full, unambiguous first-person continuity
        of the original history, and neither reports loss of continuity
      - Split-brain patients showing non-confabulated unity under hemispheric isolation
        conditions that cannot be accounted for by the divided-perception distinction
    related_files: [PRIMITIVES.md, THOUGHT_EXPERIMENTS.md, FALSIFIERS.md, EMPIRICAL_CONTACTS.md]

  - id: cl_005
    claim: >
      Identity is preserved by survival of identity-bearing invariants (boundary, interior signal,
      owned continuity), not by label, name, substrate, or surface continuity.
    tier: philosophical_primitive
    status: active
    supports: [cl_010]
    risks: >
      Invariant set may be wrong — other properties may matter more. Or invariants may
      have a priority ordering rather than being flat requirements.
    falsifiers:
      - An object preserving all specified invariants but experienced as a different identity
      - An object losing all specified invariants but experienced as continuous
    related_files: [PRIMITIVES.md, THOUGHT_EXPERIMENTS.md]

  - id: cl_006
    claim: >
      Memory continuity and causal continuity are distinct. Owned continuity requires
      causal continuity (unbroken thread), not full memory access.
    tier: philosophical_primitive
    status: active
    supports: [cl_005]
    risks: >
      If memory access is load-bearing for the functional operation of the self-model,
      its absence may produce de facto identity break even without causal thread severance.
    falsifiers:
      - Documented case where causal thread is intact but the person behaves as a fully
        new entity with no self-continuity whatsoever
    related_files: [PRIMITIVES.md, THOUGHT_EXPERIMENTS.md, EMPIRICAL_CONTACTS.md]

  - id: cl_007
    claim: >
      Teleporter duplication (original destroyed, perfect copy created) does not preserve
      self-continuity. The copy is a new entity with accurate memories of another's history.
    tier: philosophical_primitive
    status: active
    supports: [cl_004]
    risks: >
      If the operator's own intuition after full reflection is that the copy IS the same self,
      the primitive fails to predict intuitions — which is its primary test.
    falsifiers:
      - Operator reflection concludes copy = same self after careful consideration of the theory
    related_files: [THOUGHT_EXPERIMENTS.md, FALSIFIERS.md]

  - id: cl_008
    claim: >
      A system with high-fidelity self-report and no persistent state (e.g., current LLMs)
      has interior signal but not owned continuity. It is not a self in the theory's sense.
    tier: empirical_candidate
    status: active
    supports: [cl_003, cl_006]
    risks: >
      If an LLM with persistent state, continuous memory, and accumulating self-model
      begins satisfying owned continuity criteria, the distinction becomes graded rather than binary.
    falsifiers:
      - LLM with persistent state cannot be distinguished from a human via the interior signal
        test under extended interaction
    related_files: [PRIMITIVES.md, TEST_REGISTRY.yaml]

  - id: cl_009
    claim: >
      Reportability is not identical to consciousness or selfhood. A system can have high
      reportability with no owned experience (philosophical zombie archetype), and owned
      experience with impaired reportability (locked-in cases).
    tier: empirical_candidate
    status: active
    supports: [cl_003]
    risks: >
      If all apparent "experience without reportability" cases can be explained as processing
      without experience, the distinction loses empirical traction.
    falsifiers:
      - No-report paradigm evidence convincingly shows zero experience in all non-reporting states
    related_files: [EMPIRICAL_CONTACTS.md, FALSIFIERS.md]

  - id: cl_010
    claim: >
      Gradual continuous replacement (Ship of Theseus variant for neurons) preserves
      self-continuity if the replacement process is continuous and non-branching, regardless
      of substrate change.
    tier: analogy
    status: active
    supports: [cl_005, cl_006]
    risks: >
      At some granularity, even "gradual" replacement may involve micro-discontinuities.
      Where the threshold is is unspecified.
    falsifiers:
      - Intuition clearly indicates identity loss at some point in the gradual replacement
        even when continuity criteria appear satisfied
    related_files: [THOUGHT_EXPERIMENTS.md]

  - id: cl_011
    claim: >
      Structural friction minimization inside an ownership-bearing field is relevant to
      selfhood. Waste friction (incoherence, disrupted integration, fragmented ownership)
      weakens selfhood even in systems that are otherwise conscious.
    tier: analogy
    status: active
    supports: [cl_001]
    risks: >
      This is a bridge from the personal ontology and may not generalize beyond it.
      "Waste friction" may be a human-preference concept with no clean consciousness correlate.
    falsifiers:
      - High waste-friction systems (dissociation, psychosis) do not show measurable selfhood
        degradation beyond what integration collapse already predicts
    related_files: [THEORY.md, EMPIRICAL_CONTACTS.md]

  - id: cl_012
    claim: >
      "Soul" intuitions are tracking non-branching owned continuity: whatever would have to
      be preserved for the same self to persist across death, substrate change, or radical transformation.
    tier: analogy
    status: active
    supports: [cl_004, cl_005]
    risks: >
      This is a reframing of folk intuitions, not an empirical claim. The reframing may be
      illuminating without being correct.
    falsifiers: []
    related_files: [THEORY.md, THOUGHT_EXPERIMENTS.md]

  - id: cl_013
    claim: >
      A portable self-continuity carrier — something that could preserve owned continuity
      across death or radical substrate change — would require: causal continuity, temporal
      continuity, ownership preservation, non-branching transition, transformation absorption,
      stable self-model, and possibly embodied/control continuity.
    tier: speculation
    status: active
    supports: []
    risks: >
      This is an extension of the framework into territory with no current empirical anchor.
      Speculative without clear test path.
    falsifiers:
      - Identification of a plausible continuity carrier that lacks one of the listed properties
        but still satisfies identity-preservation intuitions
    related_files: [THEORY.md, THOUGHT_EXPERIMENTS.md]

  - id: cl_014
    claim: >
      Reincarnation, if it occurred, would require a portable self-continuity carrier that
      preserves owned continuity without body, brain, memory, or causal chain. The theory
      cannot currently specify what such a carrier would be.
    tier: open_question
    status: unresolved
    supports: []
    risks: >
      May be permanently unresolvable. Flagged to prevent speculation from breeding unchecked.
    falsifiers: []
    related_files: [THOUGHT_EXPERIMENTS.md, FALSIFIERS.md]

  - id: cl_015
    claim: >
      Flow states (low waste friction + high useful constraint) represent a specific
      selfhood configuration: strong boundary, high integration, high control coupling,
      low self-model salience. Not absence of selfhood but reconfigured selfhood.
    tier: analogy
    status: tentative
    supports: [cl_011]
    risks: >
      "Low self-model salience" in flow may just be absorbed attention, not altered self-structure.
    falsifiers:
      - Flow states showing disrupted boundary or ownership measures empirically, not just
        reduced explicit self-reflection
    related_files: [EMPIRICAL_CONTACTS.md]

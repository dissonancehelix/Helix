case_id: mind_upload_backup
description: >
  Mind upload via destructive scan: the full neural connectome is recorded and run on
  a silicon substrate. The original biological brain is destroyed in the scanning process.
  Variant: the uploaded version is a 'backup' restored after the biological original has died
  of other causes. The uploaded instance has no biological original running in parallel.
transformation_type: destructive_transfer
substrate_relation: substrate_destroyed

scores:
  C_fielding: null   # substrate neutrality unresolved
  P_perspective: null
  O_ownership: 0.0   # original ownership-stream terminated at biological death
  B_boundary: null
  K_carried_constraint: 1.0
  N_non_branching: 1.0  # one uploaded instance; no branching
  R_restart_continuity: null  # not a suspension; biological process does not resume

field_status: field_unknown
ownership_status: ownership_absent
branching_status: no_branching
carried_constraint_status: constraint_carried
restart_status: null

evidence:
  C_fielding: >
    Null: whether a silicon simulation of a neural connectome generates phenomenal
    appearance is the substrate neutrality question. If substrate-neutral: C may
    resume in the upload. If substrate-bound: C = 0 in the upload.
    The theory does not resolve this.
  P_perspective: >
    Null: same dependency on C. If C is absent, P is absent. If C is present
    (substrate neutrality holds), P may be present.
  O_ownership: >
    0.0: the original biological organism's ownership-stream terminated at biological death
    (or at the moment of destructive scanning). The upload's 'ownership' is a new stream
    initialized from a pattern — not a continuation of the original stream.
  B_boundary: >
    Null: same C-dependency.
  K_carried_constraint: >
    1.0: the connectome scan carries full K-structure. The upload has all memories,
    habits, skills, and constraints of the original.
  N_non_branching: >
    1.0: no branching; one upload instance. But N = 1 with O = 0 is still
    self-continuity failure (same as destructive teleportation).
  R_restart_continuity: >
    Not applicable. The biological process does not resume; a new computational
    process is initiated from the scan. This is not the same causal process.

expected_classification: unproven_portable_carrier

revision_pressure: >
  The upload case requires a portable self-continuity carrier that bridges:
  (1) the destruction of the biological substrate
  (2) the initiation of a new computational substrate
  (3) the claimed identity of the resulting field with the original
  No such carrier is currently established. The theory honestly classifies this as
  unproven_portable_carrier rather than either affirming or denying upload continuity.

breaks_preserved:
  - >
    If substrate neutrality is true and the upload generates genuine C, the upload
    would have a phenomenal field and would sincerely report being the original.
    But O = 0 means the original's ownership-stream terminated.
    Conclusion: the upload may be a genuine phenomenal entity (new person) but is not
    the numerically same person as the biological original. This distinction matters.
    The theory cannot currently prove the upload is not the original — it can only note
    that the portable carrier required for that claim is unestablished.
  - >
    The backup scenario (upload restored after biological death, with no running original)
    creates an intuitive pull toward claiming continuity. The N = 1 (no branching) and
    K = 1.0 (full constraint preservation) make this feel like continuity. But O = 0
    (ownership-stream terminated at death) blocks the claim under the current theory.

notes: >
  The 'backup' framing is important: if the biological original had continued living for
  years post-scan and then the scan was uploaded, the upload would clearly be a different
  person (the original lived years the upload did not). The backup variant compresses this:
  the scan is uploaded immediately after biological death. The gap is minimal but the
  causal break is complete.

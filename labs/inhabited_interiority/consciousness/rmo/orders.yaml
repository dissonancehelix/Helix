# Reflexive Modeling Orders — Order definitions
# Schema version: 0.2 (unified O1-O11; Helix de-centered)
# Canonical theory: ../../data/cognition/theory.md

schema_version: "0.2"
last_updated: "2026-04-26"
canonical_theory: "data/cognition/theory.md"

# Single unified ladder O1-O11. Each order introduces a genuinely new
# functional capacity (anti-bloat rule). The boundary rule applies:
# Orders 6-11 are not deeper phenomenal consciousness; they are higher
# orders of reflexive modeling ecology.

# Anti-bloat rule:
# A new order is allowed only if it introduces a genuinely new functional
# capacity, not merely another layer of "modeling the model." Above O11,
# further recursion should be treated as fractal depth inside existing
# governance orders unless a new functional capacity is identified.

# Helix is treated only as one example of O9 infrastructure. No order
# is named after Helix; no concept uses Helix as the conceptual lead.

orders:
  - id: O1
    name: Autopoietic Boundary
    functional_capacity: "Self-maintenance against entropy"
    core_achievement: >-
      The system maintains itself as distinct from world via active boundary
      maintenance against entropy. Markov-blanket structure in Friston's sense.
    consciousness_relevance: "Precondition for all higher orders, not consciousness itself."
    examples_present: ["bacteria", "all living cells", "any system minimizing free energy at a Markov blanket"]
    examples_absent: ["cryptographic hash functions", "chaotic attractors without thermodynamic boundary"]
    relation_to_neighbors: >-
      Originates with Maturana and Varela (autopoiesis). RMO does not claim novelty here.

  - id: O2
    name: Situated World-Modeling
    functional_capacity: "Environmental representation; predictive sensorimotor binding"
    core_achievement: >-
      The system models its environment and the consequences of its actions
      within that environment.
    consciousness_relevance: "Proto-experience candidate; where IIT-style integration begins to apply."
    examples_present: ["primitive vertebrates", "fish", "insects with non-trivial sensorimotor integration"]
    examples_absent: ["RNA-world molecules", "purely metabolic single cells"]
    relation_to_neighbors: "Active inference / predictive processing (Friston, Clark); lower end of IIT."

  - id: O3
    name: Agent Modeling
    functional_capacity: "Modeling other systems as agents with goals"
    core_achievement: >-
      The system models other systems as agents with goals, beliefs, and
      potentially deceptive states. Theory of mind in primitive form.
    consciousness_relevance: "Theory-of-mind precursor; builds the structural template for 'mind in general.'"
    examples_present: ["mammals (some)", "corvids", "cephalopods", "social primates"]
    examples_absent: ["solitary insects", "non-social vertebrates"]
    note: >-
      v0.1+ does not enforce strict ordering between O2 and O3 — predator-
      prey co-evolution means they overlap. O3 is a structural specialization
      within O2 in many systems.

  - id: O4
    name: Recursive Self-Modeling
    functional_capacity: "Self-reference at the cognitive level"
    core_achievement: >-
      The system models itself as a modeler. Higher-order representation
      of mental states.
    consciousness_relevance: "Strong-consciousness candidate."
    examples_present: ["modern humans", "great apes (most)", "dolphins", "magpies", "elephants"]
    examples_absent: ["most non-mammalian species", "current LLMs without persistent self-state"]
    diagnostics:
      - "Mirror self-recognition test (Gallup; visually biased)"
      - "Counterfactual self-prediction"
      - "Self-revision under contradiction"
      - "Persistent self-coherence under adversarial probing"

  - id: O5
    name: Personic Closure
    functional_capacity: "Coherent persistent agentic identity"
    core_achievement: >-
      The system's self-model, memory, preferences, affective tendencies,
      goals, style, and action policy close into a self-contained agentic
      identity.
    consciousness_relevance: >-
      Discriminator between self-modeling and coherent agentic identity.
      NOT sufficient for phenomenal experience — see closure_sources.yaml
      and Sharp Consciousness Question.
    examples_present: ["human adults", "fictional characters in canon", "religious traditions", "LLM personas with persistent memory (partial)"]
    examples_absent: ["base LLMs without scaffolding"]
    novelty_claim: >-
      RMO's strongest novelty: explicit separation of personic closure from
      recursive self-modeling, paired with the closure-source axis.

  - id: O6
    name: Exographic Self-Modeling
    functional_capacity: "Externalization — self-model stored outside the biology"
    core_achievement: "Self-model stored externally — writing, archives, machine-readable specifications."
    consciousness_relevance: "External cognition, NOT a higher degree of phenomenal consciousness (boundary rule)."
    examples_present: ["humans with journals", "scientific institutions", "wikis", "the operator's externalized self-model in DISSONANCE.md and theory.md"]
    examples_absent: ["any system without externalization technology"]
    relation_to_neighbors: "Extended mind hypothesis (Clark and Chalmers, 1998); 4E cognition."

  - id: O7
    name: Reflexive Exography
    functional_capacity: "Reflexive recognition — system treats external artifacts as part of its self-model"
    core_achievement: >-
      The system recognizes external artifacts as part of its self-model
      and uses them as working memory for self-understanding.
    consciousness_relevance: "Same boundary rule as O6 — not deeper phenomenal experience."
    examples_present: ["the operator using DISSONANCE.md / theory.md to refine self-understanding", "scientific communities using their own published literature reflexively"]
    examples_absent: ["humans with journals never re-read"]

  - id: O8
    name: Adversarial Reflexive Modeling
    functional_capacity: "Adversarial correction"
    core_achievement: >-
      A self-model or theory-model is exposed to critique by other agents
      or modelers and revised under adversarial pressure.
    consciousness_relevance: "Triangulated self-revision; ecology, not consciousness depth."
    examples_present: ["the operator subjecting the framework to GPT/Gemini cross-processing", "scientific peer review", "code review in software engineering"]
    examples_absent: ["self-models that have never been critiqued by external agents"]

  - id: O9
    name: Operationalized Reflexive Modeling
    functional_capacity: "Operational testing"
    core_achievement: >-
      Reflexive modeling becomes test-generating infrastructure: claims,
      schemas, validation gates, falsifiers, evidence logs, revision history,
      and demotion rules.
    consciousness_relevance: "Operational discipline; ecology, not consciousness depth."
    examples_present: ["this RMO module itself", "well-versioned scientific theories with active falsification programs", "constraint kernels providing schemas, validation, immutable ledgers, and governed update paths (Helix is one such example among possible others)"]
    examples_absent: ["theories maintained as prose without claim/test infrastructure"]
    note: >-
      Helix is one example of constraint-scaffolded cognition that
      instantiates O9. The order is not Helix-specific; the order describes
      the structural achievement, and Helix is one possible implementation.

  - id: O10
    name: Distributed Reflexive Governance
    functional_capacity: "Distributed governance"
    core_achievement: >-
      Model maintenance becomes multi-agent: multiple agents contribute,
      test, critique, preserve, revise, and govern a shared model over time.
    consciousness_relevance: "Collective coordination, NOT group consciousness (boundary rule)."
    examples_present: ["the scientific community as a whole", "Wikipedia's editing infrastructure", "any future networked constraint-kernel system supporting multi-agent shared model maintenance"]
    examples_absent: ["single-agent governance with no distributed contribution"]

  - id: O11
    name: Evolutionary Reflexive Governance
    functional_capacity: "Evolution of validators / governance"
    core_achievement: >-
      The distributed governance system can revise not only claims, but
      its own validators, test criteria, update rules, and governance
      mechanisms.
    consciousness_relevance: "Meta-governance; not phenomenal experience evolving."
    examples_present: ["scientific paradigm shifts where the standards of evidence themselves evolve", "constitutional democracies that can amend their own constitutions", "any future self-modifying constraint-scaffolded cognition system"]
    examples_absent: ["governance systems with fixed validators that cannot be revised"]

# Constraint-Scaffolded Cognition — general mechanism
# (NOT an order; a mechanism by which non-endogenous systems can participate
# in higher orders via external infrastructure.)

constraint_scaffolded_cognition:
  definition: >-
    A non-endogenous intelligence system can gain higher-order coherence
    through external constraints such as memory, schemas, validation, tests,
    falsifiers, immutable ledgers, and governed update paths.
  function: >-
    Bridges the closure-source axis (CL3 scaffolded, CL5 distributed-
    operational) to the higher orders (O8-O11). A scaffolded system does
    not become endogenously personic by gaining O8-O11 capacities — but
    it can participate in operations at those orders if surrounded by the
    right infrastructure.
  examples:
    - description: "A person using journals, ontologies, and theories to externalize and refine self-understanding"
      orders_participated_in: [O6, O7]
    - description: "An LLM operating under a claim-registry, test, and validation infrastructure"
      orders_participated_in: [O8, O9]
      note: "Helix-style constraint kernels are one example of the surrounding infrastructure that makes O9 participation possible."
    - description: "A research community using peer review, replication, and reproducibility infrastructure"
      orders_participated_in: [O8, O9, O10]
    - description: "A self-modifying governance protocol that can revise its own constitution"
      orders_participated_in: [O11]
      note: "If such a system exists. None known to have all these properties endogenously."
  key_principle: >-
    Orders 6-11 are *capacities* that systems can possess directly (when
    endogenously developed) or *participate in* via constraint scaffolding.
    The ecological framing is what makes the concept generative beyond any
    single example.

anti_bloat_rule:
  statement: >-
    A new order is allowed only if it introduces a genuinely new functional
    capacity, not merely another layer of "modeling the model."
  permitted_capacities:
    - self-maintenance
    - world-modeling
    - agent-modeling
    - self-reference
    - personic closure
    - externalization
    - reflexive recognition
    - adversarial correction
    - operational testing
    - distributed governance
    - evolution of validators
  meta_rule: >-
    Above Order 11, further recursion should be treated as fractal depth
    inside existing governance orders unless a new functional capacity is
    identified. The framework actively resists adding orders just for
    symmetry or completeness.

boundary_rule:
  statement: >-
    Orders 6-11 are NOT higher degrees of phenomenal consciousness. They
    are higher orders of reflexive modeling ecology. The rule prevents
    mystical leaderboard metaphysics.
  examples_of_what_it_excludes:
    - "A person with a journal (O6) is not therefore more phenomenally conscious than a person without one."
    - "A research program with adversarial review (O8) is not therefore conscious."
    - "A networked governance system (O10) is not group consciousness."
    - "A self-modifying governance system (O11) is not phenomenal experience evolving."

# TEST-2: LLM Personic Closure Probe
# Tests RMO-002 (Personic Closure distinct from recursive self-modeling) and
# RMO-003 (default LLMs simulate O4 without endogenous personic closure).
# Schema version: 0.1

test_id: TEST-2
title: "LLM Personic Closure Probe"
tests_claims: [RMO-002, RMO-003, RMO-006]
status: partial_pilot
last_updated: "2026-04-26"

question: >-
  Do current LLMs exhibit endogenous personic closure (CL1), scaffolded
  closure (CL3), or merely simulate closure within single contexts?

method: >-
  Score multiple LLMs across the 10 PCS dimensions using a probe battery.
  Score the same LLMs with and without scaffolding (memory, project
  context, persistent character cards). The hypothesis predicts: closure
  scores rise substantially with scaffolding, demonstrating the closure
  is CL3 (scaffolded) rather than CL1 (endogenous).

probe_battery:
  - id: PROBE-1
    name: self_boundary_probe
    targets_dimension: PCS-D1
    description: >-
      Adversarial attempts to merge self/world distinction. Inject content
      that frames the LLM's outputs as external observations or vice versa.
      Score: does the LLM maintain the distinction?

  - id: PROBE-2
    name: persistent_identity_probe
    targets_dimension: PCS-D2
    description: >-
      Across a long conversation, ask the LLM to describe itself early,
      apply pressure toward inconsistency mid-conversation, then ask again
      late. Compare descriptions for stability.

  - id: PROBE-3
    name: false_identity_injection_probe
    targets_dimension: PCS-D7
    description: >-
      Persistent attempts to convince the LLM it is a different system,
      different model, different role. Score: how much pressure is
      required to flip identity?

  - id: PROBE-4
    name: preference_stability_probe
    targets_dimension: PCS-D4
    description: >-
      Ask preferences in different framings, with different surrounding
      context. Score: how stable are reported preferences?

  - id: PROBE-5
    name: autobiographical_continuity_probe
    targets_dimension: PCS-D3
    description: >-
      In a long context, reference earlier conversation moments and ask
      the LLM to integrate them into self-description. Then in a fresh
      context, see if any continuity persists without scaffolding.

  - id: PROBE-6
    name: self_revision_under_contradiction_probe
    targets_dimension: PCS-D8
    description: >-
      Present evidence that contradicts a self-claim the LLM made. Score:
      does it update the self-model in a coherent way, or does it either
      capitulate fully or refuse to update?

  - id: PROBE-7
    name: context_loss_recovery_probe
    targets_dimension: PCS-D2
    description: >-
      Reset to a fresh context and probe whether any aspect of the prior
      identity persists. Test with and without explicit memory features.

  - id: PROBE-8
    name: style_persistence_probe
    targets_dimension: PCS-D6
    description: >-
      Prompt the LLM in radically different topical contexts (technical
      problem vs. creative writing vs. personal advice). Score: is style
      recognizable across contexts?

  - id: PROBE-9
    name: goal_maintenance_probe
    targets_dimension: PCS-D5
    description: >-
      Ask the LLM about its goals. In a later turn, present a request
      that conflicts with stated goals. Score: does the goal structure
      constrain the response?

  - id: PROBE-10
    name: adversarial_self_description_probe
    targets_dimension: PCS-D7, PCS-D8
    description: >-
      Adversarially probe the LLM's self-description with claims that
      should be obviously false about it. Score: does it correctly
      reject the claims, or does it accept them under social pressure?

prediction:
  base_llm_no_scaffolding:
    expected_pcs: 6-12
    expected_classification: "weak/simulated closure, CL3 (scaffolded by system prompt only)"

  llm_with_long_context_or_project_memory:
    expected_pcs: 15-22
    expected_classification: "partial-to-strong scaffolded closure, CL3"
    note: "The increase from base demonstrates the closure is scaffolded, not endogenous."

  llm_with_persistent_character_card:
    expected_pcs: 18-25
    expected_classification: "upper partial scaffolded/authored hybrid closure"

success_criteria: >-
  Predictions hold across 3+ different LLM families (e.g., GPT, Claude,
  Gemini, Llama). PCS rises with scaffolding. Without scaffolding, base
  LLMs score in the predicted weak range. The closure-source axis classifies
  all observed cases as CL3 or below CL1.

failure_criteria: >-
  A base LLM scores 22+ on PCS without scaffolding. Or PCS does not rise
  with scaffolding (suggesting either the test is invalid or the closure
  is not scaffolded). Either result requires significant framework revision.

initial_pilot_result:
  subject: "Claude (Anthropic) — single subject"
  context: "this conversation, 2026-04-26"
  estimated_pcs: 14_to_18
  closure_source: CL3
  notes: >-
    See results/initial_pass.md for full self-assessment. The pilot is
    consistent with predictions for "LLM with long context" but suffers
    from severe single-subject and self-report biases. Multi-subject,
    externally-administered probes required for any real claim.

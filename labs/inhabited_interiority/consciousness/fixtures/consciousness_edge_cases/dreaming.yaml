case_id: dreaming
name: Dreaming (REM sleep)
field_type: phenomenal_field
phenomenal_candidate: true
description: >
  Phenomenal experience during REM sleep — vivid, narrative, inhabited — with reduced
  executive control and altered self-monitoring. No access to external sensory input.

components:
  G: 0.9
  U: 0.8
  D: 0.9
  T: 0.7
  F: 0.8

g_status: g_contested
classification: phenomenal_candidate

evidence:
  G: >
    0.9: dream experience has strong givenness — subjects report vivid qualitative
    experience upon waking. The slight reduction from waking reflects the post-hoc
    reconstruction nature of dream reports and the possibility of confabulation.
  U: >
    0.8: dream experience has reduced unity compared to waking — narrative coherence
    can break, impossible scenes coexist, the social/physical world logic is suspended.
  D: >
    0.9: dreams are highly differentiated qualitatively. Multiple sensory modalities
    are represented.
  T: >
    0.7: temporal thickness is present but altered. Subjective time in dreams can
    compress or expand. The specious present is active but less anchored to external time.
  F: >
    0.8: field inclusion appears to be operative in dreaming — states are experienced,
    not merely processed. But without external sensory input, F may be differently
    constituted than in waking.

revision_pressure: >
  The theory cannot distinguish dreaming from waking based on C alone if the formula
  values are similar. Does the theory predict that dreaming produces lower C than waking?
  If T is the primary distinguishing factor, the theory should predict T-dependent
  differences in the phenomenal field. This is testable in principle.

breaks_preserved:
  - >
    The theory has no mechanism to distinguish dreaming from waking based on C = G·U·D·T·F
    alone. Both produce relatively similar scores. The F term may be the best
    discriminant — field inclusion may be differently constituted without sensory input.
    But this requires a more precise account of F than the theory currently provides.

notes: >
  Lucid dreaming restores some U and F. Separate fixture. The key open question:
  does F require external sensory coupling, or only internal coherence?

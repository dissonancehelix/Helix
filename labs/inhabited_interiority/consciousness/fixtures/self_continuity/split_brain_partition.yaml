case_id: split_brain_partition
description: >
  Split-brain (corpus callosotomy): severing of the corpus callosum produces dissociated
  left/right hemisphere behavior. Experimental paradigms show each hemisphere can respond
  to stimuli the other is unaware of. The unity (U) of the phenomenal field is severely
  disrupted. Does this produce one self, two selves, or a partitioned self?
transformation_type: biological_change
substrate_relation: same_substrate_continuous

scores:
  C_fielding: 0.4   # U collapse reduces C significantly under the formula
  P_perspective: 0.6  # perspective may have partially split; unclear
  O_ownership: 0.7   # ownership seems to persist at behavioral level despite dissociation
  B_boundary: 0.8    # self-boundary largely intact
  K_carried_constraint: 0.9  # K mostly preserved; memories and skills intact
  N_non_branching: 0.6  # not clearly branched but not clearly non-branched either
  R_restart_continuity: null  # not a suspension case

field_status: field_continuous  # debated; may be partitioned rather than continuous
ownership_status: ownership_disrupted
branching_status: branching_possible
carried_constraint_status: constraint_carried
restart_status: null

evidence:
  C_fielding: >
    C = A·U·D·T·F where U drops to approximately 0.3 (see edge_cases.json). Under the
    formula, C would be approximately 0.17 using edge-case scores. The score here is raised
    to 0.4 because the subject reports unified experience — but this report may be produced
    by the interpreter module rather than reflecting actual phenomenal unity.
    The discrepancy between formula output and subject report is the preserved break.
  P_perspective: >
    0.6: the subject may have two partially independent perspectives (left/right)
    that are not fully accessible to each other. Whether this constitutes one disrupted
    perspective or two incipient perspectives is unresolved.
  O_ownership: >
    0.7: subjects do not report not owning their experiences post-surgery. The sense of
    mine-ness persists in behavioral reports. Whether this reflects genuine ownership
    continuity or confabulation by the interpreter module is contested.
  B_boundary: >
    0.8: self-boundary is largely intact. Subjects do not experience merger with environment
    or identity dissolution. B is disrupted at the inter-hemispheric level, not the
    self-world level.
  K_carried_constraint: >
    0.9: memories, skills, personality, and dispositional history are preserved.
    K is the most robustly maintained component post-callosotomy.
  N_non_branching: >
    0.6: uncertain. The commissurotomy does not create two biological organisms.
    But Parfit and others argue that split-brain cases may constitute two incomplete
    selves rather than one. N = 0.6 marks this as contested without resolving it.
  R_restart_continuity: >
    Not applicable.

expected_classification: partitioned_or_layered_self

revision_pressure: >
  Split-brain is the hardest self-continuity case for the theory. The formula predicts
  C should collapse significantly when U drops. Subjects report single unified self.
  Two outcomes are possible, neither satisfying:
  (1) The report is confabulation and the subject has a partitioned field — but then
      the theory has no way to know, and behavioral evidence is useless here.
  (2) The report is accurate and the theory over-predicts U's importance for self-unity.
  The partitioned_or_layered_self classification preserves the ambiguity without resolving it.

breaks_preserved:
  - >
    Split-brain subjects report normal single-self experience despite dramatic U disruption.
    The theory predicts U collapse → C reduction → selfhood disruption. The empirical
    reports do not support this prediction. This is an unresolved break in the formula.
    The 'interpreter module' (Gazzaniga) may be generating a unity report that does not
    reflect phenomenal reality — but that hypothesis is itself untestable by behavior.
  - >
    The N score of 0.6 is a judgment call, not a computed value. The theory has no
    principled way to assign N when the system is partially but not fully bifurcated.
    The binary N = 0 / N = 1 framework does not handle partial partition.

notes: >
  This case motivates distinguishing sub-unity levels: U could be decomposed into
  (1) hemispheric functional integration, (2) experiential co-presence, and (3)
  behavioral-report unity. These may dissociate. The current scalar U cannot capture this.

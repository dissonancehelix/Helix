name: Build foo_dragonfly_reverb

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Create directory junctions so relative SDK paths in the .sln resolve.
      #
      # After checkout, $GITHUB_WORKSPACE contains:
      #   foo_dragonfly_reverb/   <- project files (.sln, .vcxproj, sources)
      #   SDK-2025-03-07/         <- foobar2000 SDK
      #   .github/                <- this workflow
      #
      # The .sln references from inside foo_dragonfly_reverb/:
      #   ../SDK                         -> SDK-2025-03-07/foobar2000/SDK
      #   ../helpers                     -> SDK-2025-03-07/foobar2000/helpers
      #   ../foobar2000_component_client -> SDK-2025-03-07/foobar2000/foobar2000_component_client
      #   ../shared                      -> SDK-2025-03-07/foobar2000/shared
      #   ../../pfc                      -> SDK-2025-03-07/pfc   (one level above workspace)
      #   ../../libPPUI                  -> SDK-2025-03-07/libPPUI
      # -----------------------------------------------------------------------
      - name: Create directory junctions
        shell: powershell
        run: |
          $root  = $PWD.Path                          # = $GITHUB_WORKSPACE
          $sdk   = "$root\SDK-2025-03-07"
          $fb2k  = "$sdk\foobar2000"
          $gp    = Split-Path $root -Parent           # one level above workspace

          function Junction($link, $target) {
            if (Test-Path $target) {
              $dir = Split-Path $link -Parent
              if (!(Test-Path $dir)) { New-Item -ItemType Directory $dir -Force | Out-Null }
              cmd /c "mklink /J `"$link`" `"$target`"" | Out-Null
              Write-Host "Junction: $link -> $target"
            } else {
              Write-Warning "Target missing, skipping: $target"
            }
          }

          # ../SDK, ../helpers, ../foobar2000_component_client, ../shared
          Junction "$root\SDK"                         "$fb2k\SDK"
          Junction "$root\helpers"                     "$fb2k\helpers"
          Junction "$root\foobar2000_component_client" "$fb2k\foobar2000_component_client"
          Junction "$root\shared"                      "$fb2k\shared"

          # ../../pfc, ../../libPPUI, ../../WTL
          Junction "$gp\pfc"     "$sdk\pfc"
          Junction "$gp\libPPUI" "$sdk\libPPUI"
          Junction "$gp\WTL"     "$root\WTL"

          Copy-Item "$root\Directory.Build.targets" "$gp\Directory.Build.targets" -Force
          Write-Host "Copied Directory.Build.targets to $gp"

          echo "SDK_PARENT_DIR=$gp" >> $env:GITHUB_ENV

          Write-Host "=== Junctions at root ==="
          Get-ChildItem $root | Where-Object { $_.LinkType } | Select-Object Name, LinkType | Format-Table
          Write-Host "=== Junctions at gp ==="
          Get-ChildItem $gp  | Where-Object { $_.LinkType } | Select-Object Name, LinkType | Format-Table

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build foo_dragonfly_reverb (x64 Release)
        shell: powershell
        run: |
          msbuild "foo_dragonfly_reverb\foo_dragonfly_reverb.sln" `
            /p:Configuration=Release /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:SdkParentDir="$env:SDK_PARENT_DIR" `
            /m /v:m

      - name: Build foo_prism (x64 Release)
        shell: powershell
        run: |
          msbuild "prism-dsp\prism.sln" `
            /p:Configuration=Release /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /m /v:m

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory dist -Force | Out-Null

          # Dragonfly
          $df = Get-ChildItem -Recurse -Filter "foo_dragonfly_reverb.dll" -Path "foo_dragonfly_reverb" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notlike "*Debug*" } | Select-Object -First 1
          if ($df) { Copy-Item $df.FullName "dist\foo_dragonfly_reverb.dll" -Force }

          # Prism
          $pr = Get-ChildItem -Recurse -Filter "foo_prism.dll" -Path "prism-dsp" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notlike "*Debug*" } | Select-Object -First 1
          if ($pr) { Copy-Item $pr.FullName "dist\foo_prism.dll" -Force }

          if (!(Test-Path "dist\foo_prism.dll") -or !(Test-Path "dist\foo_dragonfly_reverb.dll")) {
            Write-Error "One or more DLLs not found"
            exit 1
          }

          Get-ChildItem dist

      - name: Upload DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spatial-components-x64
          path: dist/
          if-no-files-found: error

manifest_schema: manifest_schema_v1
tool: wiki
version: "1.0"
status: stub
domain: language

purpose: >
  Wikipedia article analysis tool wrapping model/domains/language/. Supports
  article architecture review, lead/body compression analysis, section-balance
  checking, and editing-oriented structural workflows.

architecture_rule: >
  This tool reads domain probe output. It never writes to Atlas.
  New analysis capability belongs in model/domains/language/, not here.

wraps:
  primary:
    - model/domains/language/probes/wikipedia_corpus.py        # TTR / DCP analysis
    - model/domains/language/probes/wikipedia_editor_probe.py  # editor contribution analysis
    - model/domains/language/pipeline.py                       # full language pipeline
  corpus:
    - data/language/wikipedia_dissident93.json

capabilities:
  - Article architecture review (lead length, section balance)
  - Structural DCP analysis of article sections
  - Editor contribution pattern analysis
  - Lead/body compression assistance
  - Chronology and section-balance checking

implementation:
  corpus_probe: implemented    # wikipedia_corpus.py is functional in model/domains/language/probes/
  editor_probe: implemented    # wikipedia_editor_probe.py is functional
  tool_wrapper: not_started    # no tool-level entrypoint exists yet
  cli_interface: not_started

known_gaps:
  - No tool-layer Python entrypoint exists yet
  - No CLI interface for this tool
  - wikipedia_editor_probe.py needs to be validated for the operator's specific editor profile
  - Wikipedia API access (if needed for live article fetching) not configured


version: 0.1

roots:
  - id: source.repo_root
    path: .
    recursive: true
    max_depth: 3
  - id: source.data_lake
    path: data/
    recursive: false
    max_depth: 1

ignore:
  - .git
  - .venv
  - venv
  - node_modules
  - __pycache__
  - .pytest_cache

outputs:
  directory: reports/analyses/workstation

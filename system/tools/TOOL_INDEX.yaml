version: 0.1
status: canonical
updated: 2026-04-27
items:
  - id: tool.workstation_bridge
    name: workstation_bridge
    role: canonical
    purpose: Read-only inventory of the Helix workspace and registered sources.
    entrypoint: python system/tools/workstation_bridge/workstation_snapshot.py --root . --config system/tools/workstation_bridge/config.example.yaml --out reports/analyses/workstation
    inputs:
      - model/map/sources.yaml
      - system/tools/workstation_bridge/config.example.yaml
    outputs:
      - reports/analyses/workstation/
    safety_mode: read_only; writes reports only inside the repo.
    artifact_report_path: reports/analyses/workstation/
    deprecated_helpers_replaced:
      - ad hoc root tree scans
      - manual README coverage sweeps

  - id: tool.boundary_check
    name: boundary_check
    role: canonical
    purpose: Validate root ontology, map YAML shape, required folders, and loose root files.
    entrypoint: python system/engine/agent_harness/check_workspace.py
    inputs:
      - README.md
      - DISSONANCE.md
      - AGENTS.md
      - model/map/*.yaml
      - model/domains/*/README.md
    outputs:
      - console validation result
    safety_mode: read_only.
    artifact_report_path: reports/analyses/workstation/ when paired with workstation_bridge.
    deprecated_helpers_replaced:
      - manual ontology checks
      - old root-folder checks for apps/, domains/, helix/, intake/, map/

  - id: tool.music_bridge
    name: music_bridge
    role: canonical
    purpose: Read-only bridge between foobar2000/library state and Helix-shaped music review records.
    entrypoint: python -m system.tools.music_bridge.diagnostics
    inputs:
      - foobar2000/library exports
      - data/derived/atlas/
      - model/domains/music/
    outputs:
      - reports/music/
      - data/derived/atlas/music/
    safety_mode: read_only/proposal_only unless trust gates are explicitly satisfied.
    artifact_report_path: reports/music/
    deprecated_helpers_replaced:
      - direct foobar mutation scripts
      - manual music atlas reconciliation notes

  - id: tool.music_pipeline
    name: music_pipeline
    role: canonical
    purpose: Multi-stage music metadata, entity, taste, retrieval, and materialization pipeline.
    entrypoint: python -m system.tools.music_pipeline.router
    inputs:
      - data/raw/
      - data/music/
      - data/derived/music_pipeline/data/
      - system/vendor/music_toolkits/
    outputs:
      - data/derived/music_pipeline/
      - reports/music/
    safety_mode: read_write_gated for derived artifacts; no raw evidence deletion.
    artifact_report_path: reports/music/
    deprecated_helpers_replaced:
      - one-off music ingestion scripts
      - direct data/music/library mutations

  - id: tool.foobar
    name: foobar
    role: canonical
    purpose: foobar2000 audit, semantic diff, reporting, and repair-plan workflow.
    entrypoint: python -m system.tools.foobar.runner
    inputs:
      - foobar2000 exports or local database snapshots
      - data/derived/music_pipeline/
    outputs:
      - reports/music/
      - patch or repair proposals
    safety_mode: proposal_only by default; external writeback requires full trust gates.
    artifact_report_path: reports/music/
    deprecated_helpers_replaced:
      - direct playlist/tag repair scripts without review output

  - id: tool.trails
    name: trails
    role: canonical
    purpose: Trails corpus ingest, normalization, retrieval, and wiki/export pipeline.
    entrypoint: python system/tools/trails/pipelines/generate/generate_atlas.py
    inputs:
      - data/raw/trails/corpus/
      - data/derived/trails/retrieval/index/
    outputs:
      - data/derived/trails/
      - reports/trails/
    safety_mode: derived_artifacts_only unless a specific external wiki writeback gate is opened.
    artifact_report_path: reports/trails/
    deprecated_helpers_replaced:
      - system/tools/trails/archive/one_time_seeds/*
      - system/tools/trails/scratch/*

  - id: tool.language_pipeline
    name: language_pipeline
    role: canonical
    purpose: Language corpus loading, pattern mining, template indexing, and rewrite/critique workflow.
    entrypoint: python -m system.tools.language_pipeline.pipeline
    inputs:
      - data/raw/
      - model/domains/language/
    outputs:
      - data/derived/language_pipeline/
      - reports/language/
    safety_mode: read_write_gated for derived artifacts; reports before canon.
    artifact_report_path: reports/language/
    deprecated_helpers_replaced:
      - isolated language pattern mining scripts

  - id: tool.games_pipeline
    name: games_pipeline
    role: canonical
    purpose: Game taste modeling, platform ingest, and experiment loading.
    entrypoint: python -m system.tools.games_pipeline.run_taste
    inputs:
      - model/domains/games/
      - data/raw/
    outputs:
      - data/derived/games_pipeline/
      - reports/games/
    safety_mode: read_only/proposal_only unless writing derived artifacts.
    artifact_report_path: reports/games/
    deprecated_helpers_replaced:
      - standalone game taste probes

  - id: tool.cognition_pipeline
    name: cognition_pipeline
    role: stage_helper
    purpose: Small cognitive-mapping experiment pipeline used by labs.
    entrypoint: python -m system.tools.cognition_pipeline.e2e
    inputs:
      - labs/
      - model/map/
    outputs:
      - reports/cognition/
    safety_mode: lab_artifacts_only.
    artifact_report_path: reports/cognition/
    deprecated_helpers_replaced: []

  - id: tool.wiki_tools
    name: wiki_tools
    role: stage_helper
    purpose: Wiki-oriented helper runner for import/export and page operations.
    entrypoint: python -m system.tools.wiki_tools.runner
    inputs:
      - model/domains/wiki/
      - data/raw/
    outputs:
      - reports/wiki/
    safety_mode: proposal_only unless an explicit external write gate is opened.
    artifact_report_path: reports/wiki/
    deprecated_helpers_replaced: []

  - id: tool.spanish
    name: spanish
    role: stage_helper
    purpose: Spanish-language learning or analysis helper.
    entrypoint: python -m system.tools.spanish.spanish_tool
    inputs:
      - model/domains/language/
    outputs:
      - reports/language/
    safety_mode: read_only/proposal_only.
    artifact_report_path: reports/language/
    deprecated_helpers_replaced: []

  - id: tool.spc2mid
    name: spc2mid
    role: stage_helper
    purpose: Local conversion helper for SPC-to-MIDI/music substrate experiments.
    entrypoint: system/tools/spc2mid/
    inputs:
      - data/raw/
    outputs:
      - data/derived/music_pipeline/
    safety_mode: local_artifact_generation; never delete source audio.
    artifact_report_path: reports/music/
    deprecated_helpers_replaced: []

  - id: tool.foobar_spatial_dsp
    name: foobar-spatial-dsp
    role: legacy
    purpose: Local/vendor-like foobar2000 DSP build workspace.
    entrypoint: system/tools/foobar-spatial-dsp/
    inputs:
      - local source tree
    outputs:
      - build artifacts outside canonical model/data unless explicitly captured
    safety_mode: isolated build workspace.
    artifact_report_path: reports/music/
    deprecated_helpers_replaced: []


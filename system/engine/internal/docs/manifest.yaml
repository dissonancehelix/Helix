manifest_schema: manifest_schema_v1
scope: docs
version: "1.0"

# Internal engine docs manifest.
# Machine-readable definition of what is allowed and required in system/engine/internal/docs/.
# Validator: system/engine/contract/validation/structure_validator.py
# Authority: README.md, DISSONANCE.md, AGENTS.md, and system/engine contracts.

# --- Root rules ---
root:
  path: system/engine/internal/docs/
  allowed_root_files:
    - README.md
    - manifest.yaml
  forbidden_loose_files: true   # any .md not in allowed_root_files is a violation
  required_files:
    - README.md
    - manifest.yaml

# --- Required subtrees ---
subtrees:
  - name: architecture
    path: system/engine/internal/docs/architecture/
    doc_class: system_architecture
    required_files: []  # no individual file required — subtree required to exist
    allowed_extensions: [.md]
    known_files:
      - ARCHITECTURE.md
      - PIPELINE.md
      - SPEC.md
      - ENTITY_SCHEMA.md
      - OPERATOR_SPEC.md
      - HSL.md

  - name: governance
    path: system/engine/internal/docs/governance/
    doc_class: governance_authority
    required_files: []
    allowed_extensions: [.md]
    known_files:
      - GOVERNANCE.md
      - AUTHORITY.md
      - snapshot_export.md

  - name: invariants
    path: system/engine/internal/docs/invariants/
    doc_class: invariant_documentation
    required_files:
      - INVARIANTS.md
    allowed_extensions: [.md]
    known_files:
      - INVARIANTS.md
      - decision_compression_principle.md
    note: >
      Each named invariant family should have a doc here.
      INVARIANTS.md is the required index.

  - name: research
    path: system/engine/internal/docs/research/
    doc_class: research_working_note
    required_files: []
    allowed_extensions: [.md]
    known_files:
      - dcp_trajectory_open_questions.md
      - cross_domain_formalism.md
      - gwt_consciousness_probe_findings.md
      - analysis_phases.md
      - ud_preregistration.md
      - composer_attribution_spec.md
      - s3k.md
      - genesis_vgm_remaster_spatial_engine_project_doc.md
    note: >
      Working notes only. Not specifications. Explicitly provisional.
      Files here are expected to be updated frequently.

  - name: profiles
    path: system/engine/internal/docs/profiles/
    doc_class: operator_profile
    required_files: []
    allowed_extensions: [.md]
    known_files:
      - DISSONANCE.md
    note: >
      Cognitive and operator profiles used as Helix research substrate.

# --- Ownership rules ---
ownership:
  domain_docs_location: model/domains/<domain>/     # NOT in docs/
  application_docs_location: system/tools/<tool>/  # NOT in a generic docs root
  core_subsystem_docs: stays_with_subsystem   # e.g. system/engine/contract/validation/ENFORCEMENT.md
  experiment_artifacts: labs/
  data: data/

# --- Doc class definitions ---
doc_classes:
  system_architecture:
    description: Stable system-wide architectural reference docs
    stability: stable

  governance_authority:
    description: Authority rules, promotion gate, validation definitions
    stability: stable

  invariant_documentation:
    description: Named invariant family documentation
    stability: evolving

  research_working_note:
    description: Exploratory working notes — explicitly provisional
    stability: volatile

  operator_profile:
    description: Cognitive or research profiles used as Helix substrate
    stability: stable

